substitutions:
  update_interval: "1s"   # Update interval for control logic
  charging_step: "0.1"    # Step for reducing charging current
  discharging_step: "0.1" # Step for reducing discharging current
# +--------------------------------------+
# name that will appear in esphome and homeassistant.
  name: homehna
  luxid: lux_3253631886
  dyndnsurl: https://freemyip.com/update?token=09b0a2807898a8d32ac01a4f&domain=homehna.freemyip.com
# +--------------------------------------+
# Number of Battery modules max 8. Each LX U5.4-L battery is 5.4kWh, select the number closest to your capactiy eg 3.2V * 280Ah * 16 = 14.3kWh
  batt_modules: "1"
# +--------------------------------------+
# | Battery Charge Settings              |
# +--------------------------------------+

# +--------------------------------------+
# This is max charging amps eg 100A, for Bulk - Constant Current charging(CC), should be at least 10A less than BMS change current protection, 0.5C max
# 100A * 50V = 5000W
  charge_a: "100"
#  absorption_time: "30"
# +--------------------------------------+
# | Battery Discharge Settings           |
# +--------------------------------------+
# Max discharge amps eg 120, should be at least 10A less than BMS over discharge current protection, 0.5C max
# 120A * 50V = 6000W
  discharge_a: "100"
# +--------------------------------------+
# | Battery State of Health (SOH)        |
# +--------------------------------------+
# Maximum charging cycles is used to calculate the battey SOH, LF280K v3 =8000.0, LF280K v2 =6000.0, LF280=3000.0 (decimal is required)
  max_cycles: "6000.0"
# +--------------------------------------+
# | CAN Protocol Settings                |
# +--------------------------------------+
# CAN BMS Name (0x35E) : 0 NoSent / 1 PYLON / 2 GOODWE / 3 SEPLOS
  can_bms_name: "1"
  can_protocol: "1"
# +--------------------------------------+
# | ESP32 CAN/serial port pins           |
# +--------------------------------------+
# GPIO pins your CAN bus transceiver(TJA1050) is connected to the ESP, note! TX->TX and RX->RX. 
  can_tx_pin: GPIO16
  can_rx_pin: GPIO17
# GPIO pins your JK-BMS RS485(TTL) is connected to the ESP TX->RX and RX->TX. 
  tx_pin: GPIO9
  rx_pin: GPIO10
#  rx_pin: GPIO39 #marked as RXD on WEMOS ESP32S2 D1
#  tx_pin: GPIO37 #marked as TXD
# --------------------------------------

# +------------------------------------------------------------------+
# | ** The settings below can be modified according to your needs ** |
# +------------------------------------------------------------------+
  external_components_source: github://syssi/esphome-jk-bms@main
  # components
  # github://syssi/esphome-jk-bms@main  
  
esphome:
  name: ${name}

  on_boot:
    #priority: 100
    then:
      - switch.turn_on: switch_charging
      - switch.turn_on: switch_discharging
      - switch.turn_on: can_switch_auto_discharge_current
      - switch.turn_on: can_switch_auto_charge_current

# +--------------------------------------+
# | ESP32 settings                       |
# +--------------------------------------+
# For a stable Bluetooth connection keep the "esp-idf" framework
esp32:
  board: lolin_s2_mini
#  variant: esp32s2
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"

external_components:
  - source: ${external_components_source}
    refresh: 0s
  #- source: github://pr#5586
  #  components: [ http_request ]
logger:
  level: INFO

# If you don't want to use ESPHome's native API you can use MQQT instead.
# In this case don't forget to remove the 'api:' section.
mqtt:
  keepalive: 60s
  reboot_timeout: 0s
  broker: myhome.sfdp.net
  username: mqtt_user
  password: D1ndh1sk@
  client_id: ${name}_mqtt

safe_mode:
  num_attempts: 10
  reboot_timeout: 10min

wifi:
  #use_address: 192.168.100.22
  ap:
    ssid: "ESP32S2Lolin"
#    password: !secret wifi_ap_password
ota:
  - platform: esphome
    # safe_mode: false
    on_state_change:
      - logger.log: esphome.on_state_change
    port: 8266
    password: "D1ndh1sk@"
  
captive_portal:

packages:
  dev_info_pkg: !include ./commons/dev_info.yaml
  dyndns_pkg: !include ./commons/dyndns.yaml
  #otahttp_pkg: !include ./commons/ota_http.yaml
  charge_discharge_pkg: !include ./commons/charge_discharge_controller.yaml
  globals_pkg: !include ./commons/globals.yaml
  sensors_pkg: !include ./commons/text_sensors.yaml
  numbers_pkg: !include ./commons/numbers.yaml
  switchs_pkg: !include ./commons/switchs.yaml
  #canbus_pkg: !include ./commons/canbus_pylon.yaml
  #canbus_pkg: !include ./commons/canbus_sve.yaml
  canbus_pkg: !include ./commons/canbus_luxpower.yaml
  luxpower_pkg: !include ./commons/luxpower.yaml
  logger_pkg: !include ./commons/loggerfix.yaml

#web_server:
#  port: 80
#  log: false
#  ota: false

output:
  - platform: gpio
    pin: 15
    id: led
    inverted: true

light:
  - platform: binary
    output: led
    id: blue_led
    name: "Blue LED"
    internal: true

# +--------------------------------------+
# | JK-BMS UART connection               |
# +--------------------------------------+

uart:
  id: uart_0
  baud_rate: 115200
  rx_buffer_size: 512
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  
#  debug:
#    direction: BOTH

jk_modbus:
  id: modbus0
  uart_id: uart_0

jk_bms:
  id: bms0
  jk_modbus_id: modbus0
  update_interval: 15s
  # enable_fake_traffic: true

binary_sensor:
