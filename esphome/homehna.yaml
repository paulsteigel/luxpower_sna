substitutions:
  update_interval: "1s"   # Update interval for control logic
  charging_step: "0.1"    # Step for reducing charging current
  discharging_step: "0.1" # Step for reducing discharging current
# +--------------------------------------+
# name that will appear in esphome and homeassistant.
  name: homehna
  luxid: lux_3253631886
  dyndnsurl: https://freemyip.com/update?token=09b0a2807898a8d32ac01a4f&domain=homehna.freemyip.com

esphome:
  name: ${name}

packages:
  # ── Commons (shared across all devices) ──────────────────
  dev_info:         github://paulsteigel/luxpower_sna/esphome/commons/bms/dev_info.yaml@main
  dyndns:           github://paulsteigel/luxpower_sna/esphome/commons/bms/dyndns.yaml@main
  globals:          github://paulsteigel/luxpower_sna/esphome/commons/bms/globals.yaml@main
  text_sensors:     github://paulsteigel/luxpower_sna/esphome/commons/bms/text_sensors.yaml@main
  numbers:          github://paulsteigel/luxpower_sna/esphome/commons/bms/numbers.yaml@main
  switches:         github://paulsteigel/luxpower_sna/esphome/commons/bms/switchs.yaml@main
  canbus:           github://paulsteigel/luxpower_sna/esphome/commons/bms/canbus_luxpower.yaml@main
  charge_discharge: github://paulsteigel/luxpower_sna/esphome/commons/charge_discharge_controller.yaml@main
  luxpower:         github://paulsteigel/luxpower_sna/esphome/commons/luxpower.yaml@main
  logger_fix:       github://paulsteigel/luxpower_sna/esphome/commons/loggerfix.yaml@main
  jk_bms_base:      github://paulsteigel/luxpower_sna/esphome/commons/bms/jk_bms_base.yaml@main
  # ── Device-specific: 15 cell ─────────────────────────────
  jk_bms_cells:     github://paulsteigel/luxpower_sna/esphome/commons/bms/jk_bms_cells_15.yaml@main