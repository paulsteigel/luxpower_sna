# ============================================================
# LuxPower SNA – Package file (trimmed for Lovelace + key controls)
# Usage:
#   substitutions:
#     luxid: "lux_3253631886"
#   packages:
#     luxpower: !include commons/luxpower_sensors.yaml
# ============================================================

globals:
  - id: g_lux_host
    type: std::string
    restore_value: true
    initial_value: '""'

interval:
  - interval: 5s
    then:
      - lambda: |-
          if (id(lux_hub).is_config_ready()) return;
          // Đọc từ global, không từ template entity — MQTT không ảnh hưởng được
          auto host     = id(g_lux_host);
          auto dongle   = id(lux_config_dongle).state;
          auto inverter = id(lux_config_inverter).state;
          ESP_LOGI("lux_cfg", "watchdog: host='%s' dongle=%u inv=%u",
                   host.c_str(), (unsigned)dongle.size(), (unsigned)inverter.size());
          if (!host.empty())         id(lux_hub).set_host(host);
          if (dongle.size() == 10)   id(lux_hub).set_dongle_serial(dongle);
          if (inverter.size() == 10) id(lux_hub).set_inverter_serial(inverter);
          if (id(lux_hub).is_config_ready()) id(lux_hub).reconnect();
          
external_components:
  - source: github://paulsteigel/luxpower_sna@main
    refresh: 0s

# ── Hub ──────────────────────────────────────────────────────
luxpower_sna:
  id: lux_hub
  #host_text_id: lux_config_host
  update_interval: 30s       # ← tăng từ 20s, giảm TCP allocation spike
  hold_update_interval: 120s # ← tăng từ 60s, giảm TCP allocation spike

# ── Runtime config (set via HA UI, stored in flash) ──────────
text:
  - platform: template
    id: lux_config_host
    name: "lux_Inverter Host"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: ""
    on_value:
      then:
        - lambda: |-
            if (x.empty()) return;
            id(g_lux_host) = x;
            id(lux_hub).set_host(x);
            if (id(lux_hub).is_config_ready()) id(lux_hub).reconnect();

  - platform: template
    id: lux_config_dongle
    name: "${name} Dongle Serial"
    icon: "mdi:identifier"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: ""
    on_value:
      then:
        - lambda: |-
            if (x.size() != 10) {
              ESP_LOGW("lux_cfg", "dongle_serial must be 10 chars (got %d)", (int)x.size());
              return;
            }
            id(lux_hub).set_dongle_serial(x);
            if (id(lux_hub).is_config_ready()) id(lux_hub).reconnect();

  - platform: template
    id: lux_config_inverter
    name: "${name} Inverter Serial"
    icon: "mdi:identifier"
    entity_category: config
    mode: text
    optimistic: true
    restore_value: true
    initial_value: ""
    on_value:
      then:
        - lambda: |-
            if (x.size() != 10) {
              ESP_LOGW("lux_cfg", "inverter_serial must be 10 chars (got %d)", (int)x.size());
              return;
            }
            id(lux_hub).set_inverter_serial(x);
            if (id(lux_hub).is_config_ready()) id(lux_hub).reconnect();

# ── Number ────────────────────────────────────────────────────
number:
  - platform: template
    id: lux_config_port
    name: "${name} Inverter Port"
    icon: "mdi:ethernet"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 8000
    min_value: 1
    max_value: 65535
    step: 1
    mode: box
    on_value:
      then:
        - lambda: |-
            id(lux_hub).set_port((uint16_t)x);
            if (id(lux_hub).is_config_ready()) id(lux_hub).reconnect();

  - platform: luxpower_sna
    luxpower_sna_id: lux_hub
