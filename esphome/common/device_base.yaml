# ============================================================
# device_base.yaml — hardware & connectivity chung mọi device
# Tất cả dùng cùng PCB lolin_s2_mini + cùng MQTT server
# ============================================================

substitutions:
  name: base 
  # ── GPIO pins (cố định trên PCB) ─────────────────────────
  can_tx_pin: GPIO16
  can_rx_pin: GPIO17
  # for others
  #tx_pin: GPIO9
  #rx_pin: GPIO10
  led_pin: GPIO15
  # for doanvandan
  tx_pin: GPIO10
  rx_pin: GPIO9
  
  # ── Battery defaults (chung) ─────────────────────────────
  batt_modules: "1"
  charge_a: "100"
  discharge_a: "100"
  max_cycles: "6000.0"
  can_bms_name: "1"
  can_protocol: "1"
  external_components_source: github://syssi/esphome-jk-bms@main

# ── Board ────────────────────────────────────────────────────
esp32:
  board: lolin_s2_mini
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"

esphome:
  name: base
  name_add_mac_suffix: true
  friendly_name: base

logger:
  level: WARN

# ── Connectivity ─────────────────────────────────────────────
mqtt:
  keepalive: 60s
  reboot_timeout: 15min
  broker: myhome.sfdp.net
  username: mqtt_user
  password: !secret mqtt_password
  #client_id: !lambda |-
  #  return "esp_" + get_mac_address();
  clean_session: true         

wifi:
  ap:
    ssid: "ESPHome Setup"

safe_mode:
  num_attempts: 10
  reboot_timeout: 10min

captive_portal:

# ── LED (pin cố định trên PCB) ───────────────────────────────
output:
  - platform: gpio
    pin: ${led_pin}
    id: led
    inverted: true

light:
  - platform: binary
    output: led
    id: blue_led
    name: "Blue LED"
    internal: true

switch:
  - platform: restart
    name: "Restart"    
    id: ${name}_restart_esp
    entity_category: config
