external_components:
  - source: ${external_components_source}
    refresh: 0s

uart:
  id: uart_0
  baud_rate: 115200
  rx_buffer_size: 512 #384
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  
jk_modbus:
  id: modbus0
  uart_id: uart_0
  #rx_timeout: 50ms

jk_bms:
  id: bms0
  jk_modbus_id: modbus0
  update_interval: 15s
  
binary_sensor:
  - platform: jk_bms
    balancing:
      name: "${name} balancing"
    balancing_switch:
      name: "${name} balancing switch"
    charging:
      name: "${name} charging"
    charging_switch:
      id: charging_switch
      name: "${name} charging switch"
    discharging:
      name: "${name} discharging"
    discharging_switch:
      id: discharging_switch
      name: "${name} discharging switch"
    dedicated_charger_switch:
      name: "${name} dedicated charger switch"

sensor:
