# =================================================================
# globals.yaml — Shared state only
# =================================================================
# Chỉ chứa globals được đọc/ghi bởi NHIỀU HƠN 1 module.
# Controller-internal globals → charge_discharge_controller.yaml
# Numbers/sliders             → charge_discharge_controller.yaml
#
# Interface CVL/DVL (controller → transport):
#   g_cvl_v  : CVL pack voltage (V) — viết bởi CVL Calculator
#   g_dvl_v  : DVL pack voltage (V) — viết bởi CVL Calculator
#              đọc bởi 0x351 / modbus / bất kỳ transport nào
# =================================================================

globals:

  # ── CAN Bus state ──────────────────────────────────────────────
  - id: can_ack_counter
    type: int
    restore_value: no
    initial_value: '0'

  - id: can_msg_counter
    type: int
    restore_value: no
    initial_value: '0'

  - id: can_status
    type: std::string
    restore_value: no
    initial_value: '"OFF"'

  # ── Controller → Transport interface ───────────────────────────
  - id: charging_a
    type: int
    restore_value: no
    initial_value: '0'

  - id: discharging_a
    type: int
    restore_value: no
    initial_value: '0'

  - id: charge_status
    type: std::string
    restore_value: no
    initial_value: '"Wait"'

  - id: alarm_status
    type: std::string
    restore_value: no
    initial_value: '"NoAlarm"'

  - id: report_soc
    type: uint16_t
    restore_value: no
    initial_value: '0'

  # ── CVL / DVL interface: controller → transport ─────────────────
  - id: g_cvl_v
    type: float
    restore_value: no
    initial_value: '-1.0'

  - id: g_dvl_v
    type: float
    restore_value: no
    initial_value: '0.0'

  # ── Device identity ────────────────────────────────────────────
  - id: ${name}_canbus_name
    type: std::string
    restore_value: no