http_request:
  verify_ssl: false  # freemyip cert OK, bật true nếu muốn strict

# main.yaml — single authoritative time component
time:
  - platform: sntp
    id: my_time
    update_interval: 6h
    servers:
      - pool.ntp.org
      - time.cloudflare.com
    on_time:
      - seconds: 0
        minutes: /10
        then:
          - http_request.get:
              url: "${dyndnsurl}"
              on_response:
                then:
                  - lambda: |-
                      ESP_LOGI("DynDNS", "Status: %d", response->status_code);