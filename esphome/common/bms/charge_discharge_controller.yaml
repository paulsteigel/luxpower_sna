# =================================================================
# ADAPTIVE BATTERY CONTROL SYSTEM - V12
# =================================================================
# Self-contained: globals nội bộ + sliders + logic CHG/DIS + CVL
#
# Mỗi chiều (CHG / DIS) là một state machine độc lập:
#   SOFTSTART (0) → ADAPTIVE (1) → STOPPED (2)
#
# DISCHARGE SOFTSTART — 2 exit paths:
#   EXIT 1.1.1.1: voltage drop vào unsafe TRONG KHI ramp
#     → Cx = ramp_cur, ADAPTIVE chỉ ratchet XUỐNG (ban đêm)
#   EXIT 1.1.1.2: tải bão hòa (gap≥3A) hoặc at_max
#     → Cx = max_i, ADAPTIVE tracking 2 chiều (ban ngày)
#
# ADAPTIVE phân biệt qua cx:
#   cx < max_i → EXIT 1: chỉ giảm
#   cx = max_i → EXIT 2: tracking 2 chiều theo v_head
#
# STOPPED = giữ output=0, chờ direction change → SOFTSTART mới
# Reset về SOFTSTART: CHỈ khi đổi chiều
# Safety: below_uvp / above_ovp dùng RAW voltage
#
# CVL CALCULATOR (cuối file):
#   CVL = max_charge_voltage × cells  (user slider, không dynamic)
#   DVL = (UVP + gap × 0.5) × cells
#   Rate limit ±0.5V/s → tránh DC bus spike
#   Output → g_cvl_v / g_dvl_v (globals.yaml) → đọc bởi transport
# =================================================================

# =================================================================
# GLOBALS — Controller-internal
# =================================================================
globals:

  - id: g_startup_done
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: g_startup_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: g_dis_state
    type: int
    restore_value: no
    initial_value: '0'

  - id: g_dis_cx
    type: float
    restore_value: no
    initial_value: '-1.0'

  - id: g_dis_ceiling
    type: float
    restore_value: no
    initial_value: '-1.0'

  - id: g_dis_k_est      # sag mV/A — persist qua reboot, 280Ah LFP ≈ 1.8
    type: float
    restore_value: yes
    initial_value: '1.8'

  - id: g_chg_state
    type: int
    restore_value: no
    initial_value: '0'

  - id: g_chg_cx
    type: float
    restore_value: no
    initial_value: '-1.0'

  - id: g_chg_ceiling
    type: float
    restore_value: no
    initial_value: '-1.0'

  - id: cv_counter
    type: int
    restore_value: yes
    initial_value: '0'

  - id: ${name}_eoc
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: ${name}_eoc_timestamp
    type: time_t
    restore_value: yes
    initial_value: '0'

  - id: ${name}_cc_memory_valid
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: ${name}_last_safe_cc_a
    type: float
    restore_value: no
    initial_value: '5.0'

  - id: ${name}_last_charge_end_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: ${name}_charge_phase
    type: int
    restore_value: no
    initial_value: '0'

  - id: g_force_dis_stop
    type: bool
    restore_value: no
    initial_value: 'false'

switch:
  - platform: template
    name: "CAN Charge enabled"
    id: switch_charging
    optimistic: true
  - platform: template
    name: "CAN Discharge enabled"
    id: switch_discharging
    optimistic: true
#  - platform: template
#    name: "CAN Force bulk (top bal)"
#    id: switch_chg_bulk
#    optimistic: true
#  - platform: template
#    name: "CAN Float charge enabled"
#    id: switch_chg_float
#    optimistic: true
  - platform: template
    name: "CAN Automatic Charge Current"
    id: can_switch_auto_charge_current
    optimistic: true
 #   restore_value: true
    entity_category: config  
  - platform: template
    name: "CAN Automatic Discharge Current"
    id: can_switch_auto_discharge_current
    optimistic: true
    entity_category: config
#    restore_value: true
  - platform: template
    name: "CAN Auto Voltage Regulation"
    id: can_switch_auto_voltage
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF  # safe default — manual on first flash
    entity_category: config

# =================================================================
# SLIDERS — Tất cả tunables tập trung tại đây
# =================================================================
# Default đã ở chế độ tối ưu — chỉnh khi có lý do cụ thể
# =================================================================
number:

  - platform: template
    name: "Max charge voltage"
    id: max_charge_voltage
    # CVL target gửi cho inverter.
    # Tăng khi solar yếu để lấy thêm dòng (vd 3650mV → ~48A).
    # CCL adaptive lo CV phase, BMS OVP là safety backstop.
    # Cảnh báo: không đặt cao hơn can_over_voltage_protection!
    step: 10
    min_value: 3450
    max_value: 3700
    mode: slider
    initial_value: 3450
    unit_of_measurement: mV
    icon: mdi:battery-charging
    optimistic: true
    restore_value: true
    entity_category: config

  - platform: template
    name: "Over voltage protection"
    id: can_over_voltage_protection
    # BMS hard stop — lớp bảo vệ pin thực sự.
    # CCL adaptive bắt đầu taper khi max_cell vào (OVP - gap).
    # ≤ 3450mV để bảo toàn tuổi thọ LFP.
    step: 5
    min_value: 3400
    max_value: 3510
    mode: slider
    initial_value: 3400
    unit_of_measurement: mV
    icon: mdi:sine-wave
    optimistic: true
    restore_value: true
    entity_category: config

  - platform: template
    name: "Under voltage protection"
    id: can_under_voltage_protection
    # BMS stop discharge.
    # DVL = (UVP + gap/2) × cells — inverter dừng trước UVP taper.
    step: 10
    min_value: 3100
    max_value: 3350
    mode: slider
    initial_value: 3150
    unit_of_measurement: mV
    icon: mdi:sine-wave
    optimistic: true
    restore_value: true
    entity_category: config

  - platform: template
    name: "Charging current max"
    id: charging_current
    # CCL ceiling — adaptive controller không vượt giá trị này.
    step: 1
    min_value: 0
    max_value: "${charge_a}"
    initial_value: "${charge_a}"
    unit_of_measurement: A
    icon: mdi:current-dc
    optimistic: true
    restore_value: true
    entity_category: config
    on_value:
      then:
        - lambda: |-
            float slider_value = id(charging_current).state;

  - platform: template
    name: "Discharging current max"
    id: discharging_current
    # DCL ceiling — adaptive controller không vượt giá trị này.
    step: 1
    min_value: 0
    max_value: "${discharge_a}"
    initial_value: "${discharge_a}"
    unit_of_measurement: A
    icon: mdi:current-dc
    optimistic: true
    restore_value: true
    entity_category: config
    on_value:
      then:
        - lambda: |-
            float slider_value = id(discharging_current).state;

  - platform: template
    name: "Voltage recovery gap"
    id: ${name}_voltage_recovery_gap
    # Khoảng cách (mV) từ UVP/OVP mà adaptive bắt đầu taper.
    # Nhỏ → taper muộn hơn, dùng được nhiều pin hơn.
    # Lớn → taper sớm hơn, an toàn hơn với pin yếu.
    step: 1
    min_value: 5
    max_value: 50
    mode: slider
    initial_value: 5
    icon: mdi:battery-20
    optimistic: true
    restore_value: true
    entity_category: config

  - platform: template
    name: "Stop discharging SOC"
    id: can_soc_stop_discharging
    step: 1
    min_value: 10
    max_value: 50
    mode: slider
    initial_value: 20
    icon: mdi:battery-20
    optimistic: true
    restore_value: true
    entity_category: config

  - platform: template
    name: "Parallel packs capacity (Ah)"
    id: parrallel_packs_capacity_ah
    # Để 0 nếu chỉ 1 pack (capacity đọc trực tiếp từ BMS).
    step: 1
    min_value: 0
    max_value: 480
    mode: slider
    initial_value: 0
    unit_of_measurement: Ah
    icon: mdi:sine-wave
    optimistic: true
    restore_value: true
    entity_category: config

# =================================================================
# SENSORS
# =================================================================
sensor:
  - platform: template
    name: "Adaptive Charging Current"
    id: ${name}_adaptive_charging_current
    unit_of_measurement: "A"
    accuracy_decimals: 1
    device_class: current
    state_class: measurement

  - platform: template
    name: "Adaptive Discharging Current"
    id: ${name}_adaptive_discharging_current
    unit_of_measurement: "A"
    accuracy_decimals: 1
    device_class: current
    state_class: measurement

  # ── SOC FILTER ─────────────────────────────────────────────────
  - platform: copy
    source_id: capacity_remaining
    name: "capacity_remaining"
    id: "${name}_capacity_remaining"
    unit_of_measurement: "%"
    device_class: battery
    internal: true
    filters:
      lambda: !lambda |-
        if (isnan(id(max_cell_voltage).state) || isnan(id(min_cell_voltage).state) ||
            isnan(id(capacity_remaining).state)) return NAN;
        uint16_t max_cv     = id(max_cell_voltage).state * 1000.0;
        uint16_t min_cv     = id(min_cell_voltage).state * 1000.0;
        uint16_t soc        = id(capacity_remaining).state;
        uint16_t soc_stop_v = (uint16_t)id(can_soc_stop_discharging).state;
        if (soc >= 98) {
          if (max_cv <= id(can_over_voltage_protection).state) soc = 98;
        } else {
          if (min_cv < id(can_under_voltage_protection).state) {
            id(discharging_a) = 0;
            soc = soc_stop_v;
          } else if (id(capacity_remaining).state <= id(can_soc_stop_discharging).state) {
            float margin = id(min_cell_voltage).state * 1000.0f
                           - id(can_under_voltage_protection).state;
            float gap    = id(${name}_voltage_recovery_gap).state;
            soc = (margin > gap * 2.0f) ? soc_stop_v + 1 : soc_stop_v;
          } else {
            soc = uint16_t(id(capacity_remaining).state);
          }
          if (soc < soc_stop_v) soc = soc_stop_v;
        }
        id(report_soc) = soc;
        return soc;

  # =================================================================
  # DISCHARGE CONTROLLER V12
  # =================================================================
  - platform: copy
    source_id: min_cell_voltage
    name: "Adaptive Discharge Control"
    id: ${name}_adaptive_discharge_control
    internal: true
    on_value:
      then:
        - lambda: !lambda |-
            static float         vbuf[5]         = {0,0,0,0,0};
            static int           vbuf_idx        = 0;
            static bool          vbuf_ready      = false;
            static bool          first_run       = true;
            static bool          was_discharging = false;
            static bool          was_charging    = false;
            static float         current_out_a   = 0.0f;
            static float         last_published  = -1.0f;
            static unsigned long soft_start_ms   = 0;
            static unsigned long ramp_last_ms    = 0;
            static unsigned long log_ms          = 0;
            static float         ramp_cur        = 5.0f;
            static float         k_v0            = 0.0f;
            static float         k_i0            = 0.0f;
            static unsigned long k_t0            = 0;

            static const unsigned long STARTUP_HOLD_MS = 10000UL;
            static const unsigned long SOFT_START_MS   = 3000UL;
            static const unsigned long STEP_INT_MS     = 3000UL;
            static const float         PROBE_A         = 5.0f;
            static const float         PLATEAU_GAP_A   = 3.0f;
            static const float         CX_SAFE_RATIO   = 0.70f;
            static const float         CX_UNSAFE_RATIO = 0.50f;
            static const float         K_MIN           = 0.5f;
            static const float         K_MAX           = 50.0f;

            if (isnan(x) || isnan(id(current).state)) return;
            float raw_mv      = x * 1000.0f;
            float current_val = id(current).state;
            unsigned long now = millis();

            vbuf[vbuf_idx] = raw_mv;
            vbuf_idx = (vbuf_idx + 1) % 5;
            if (!vbuf_ready && vbuf_idx == 0) vbuf_ready = true;
            int n = vbuf_ready ? 5 : std::max(1, vbuf_idx);
            float smv = 0;
            for (int i = 0; i < n; i++) smv += vbuf[i];
            smv /= n;

            float uvp            = id(can_under_voltage_protection).state;
            float gap            = id(${name}_voltage_recovery_gap).state;
            float max_i          = id(discharging_current).state;
            bool  auto_mode      = id(can_switch_auto_discharge_current).state;
            bool  dis_enabled    = id(switch_discharging).state;
            bool  below_uvp      = (raw_mv <= uvp);
            float v_head         = smv - uvp;
            bool  unsafe_zone    = (!below_uvp && v_head < gap);
            bool  safe_zone      = (v_head >= gap);
            float step_a         = std::max(2.0f, max_i * 0.05f);
            bool  is_charging    = current_val >  0.5f;
            bool  is_discharging = current_val < -0.5f;

            int   state   = id(g_dis_state);
            float cx      = id(g_dis_cx);
            float ceiling = id(g_dis_ceiling);
            float k_est   = id(g_dis_k_est);

            auto calc_cx = [&](float ratio, float cap) -> float {
              float r = (k_est > K_MIN)
                        ? (v_head / k_est) * ratio
                        : (v_head / gap) * max_i * ratio;
              r = std::max(0.0f, std::min(max_i, r));
              if (cap > 0.0f) r = std::min(r, cap);
              return (float)(int)r;
            };

            if (first_run) {
              for (int i = 0; i < 5; i++) vbuf[i] = raw_mv;
              vbuf_ready = true; smv = raw_mv; first_run = false;
              current_out_a = 0.0f;
              if (id(g_startup_ms) == 0) {
                id(g_startup_ms)   = (uint32_t)now;
                id(g_startup_done) = false;
              }
              id(discharging_a) = 0;
              id(${name}_adaptive_discharging_current).publish_state(0.0f);
              last_published = 0.0f;
              ESP_LOGI("DIS", "BOOT V=%.0fmV k=%.2f", smv, k_est);
              return;
            }

            if (!id(g_startup_done)) {
              id(discharging_a) = 5;
              if ((now - (unsigned long)id(g_startup_ms)) >= STARTUP_HOLD_MS) {
                id(g_startup_done) = true;
                ESP_LOGI("DIS", "STARTUP DONE");
              }
              return;
            }

            if (!auto_mode) {
              current_out_a = dis_enabled ? max_i : 0.0f;
              goto publish_dis;
            }

            if (is_charging && !was_charging) {
              ESP_LOGI("DIS", "DIR→CHG: reset state=%d", state);
              state = 0; cx = -1.0f; ceiling = -1.0f;
              id(g_dis_state) = 0; id(g_dis_cx) = -1.0f; id(g_dis_ceiling) = -1.0f;
              id(g_chg_state) = 0; id(g_chg_cx) = -1.0f; id(g_chg_ceiling) = -1.0f;
            }
            was_charging = is_charging;

            if (!is_discharging) {
              was_discharging = false;
              current_out_a = 0.0f;
              goto publish_dis;
            }

            if (is_discharging && !was_discharging) {
              state = 0; cx = -1.0f; ceiling = -1.0f;
              ramp_cur = std::min(PROBE_A, max_i);
              soft_start_ms = now; ramp_last_ms = now;
              k_v0 = smv; k_i0 = -current_val; k_t0 = now;
              id(g_dis_state) = 0; id(g_dis_cx) = -1.0f; id(g_dis_ceiling) = -1.0f;
              ESP_LOGI("DIS", "SESSION smv=%.0f zone=%s v_head=%.0f k=%.2f",
                       smv, below_uvp?"DEAD":unsafe_zone?"UNSAFE":"SAFE", v_head, k_est);
            }
            was_discharging = is_discharging;

            if (safe_zone && state == 1) {
              float i_act = -current_val;
              float di = i_act - k_i0, dv = k_v0 - smv;
              unsigned long dt = now - k_t0;
              if (di >= 5.0f && dv >= 2.0f && dt >= 3000UL && dt <= 20000UL) {
                float ks = dv / di;
                if (ks >= K_MIN && ks <= K_MAX) {
                  k_est = 0.15f * ks + 0.85f * k_est;
                  k_est = std::max(K_MIN, std::min(K_MAX, k_est));
                  id(g_dis_k_est) = k_est;
                  ESP_LOGI("DIS", "k→%.2f mV/A", k_est);
                }
                k_v0 = smv; k_i0 = i_act; k_t0 = now;
              } else if (std::abs(di) < 1.0f && dt > 8000UL) {
                k_v0 = smv; k_i0 = i_act; k_t0 = now;
              }
            }

            if (state == 0) {
              if (!dis_enabled || below_uvp) {
                cx = 0.0f; state = 2; ceiling = 0.0f;
                id(g_dis_cx) = 0.0f; id(g_dis_state) = 2; id(g_dis_ceiling) = 0.0f;
                current_out_a = 0.0f;
                ESP_LOGW("DIS", "SOFT→STOP: %s smv=%.0f",
                         below_uvp?"below_uvp":"disabled", smv);
                goto publish_dis;
              }

              if (unsafe_zone) {
                cx = std::min(5.0f, max_i);
                ceiling = cx; state = 1;
                id(g_dis_cx) = cx; id(g_dis_ceiling) = ceiling; id(g_dis_state) = 1;
                current_out_a = cx;
                ESP_LOGI("DIS", "SOFT→ADAP(unsafe): Cx=5A v_head=%.0f", v_head);
                goto publish_dis;
              }

              current_out_a = ramp_cur;
              if ((now - soft_start_ms) < SOFT_START_MS) goto publish_dis;

              {
                float i_actual = -current_val;
                float c_gap    = ramp_cur - i_actual;
                bool  plateau  = (c_gap >= PLATEAU_GAP_A && i_actual > 2.0f);
                bool  at_max   = (ramp_cur >= max_i - 0.5f);

                if (unsafe_zone) {
                  cx = ramp_cur; ceiling = cx; state = 1;
                  id(g_dis_cx) = cx; id(g_dis_ceiling) = ceiling; id(g_dis_state) = 1;
                  current_out_a = ceiling;
                  ESP_LOGI("DIS", "EXIT1[volt drop]: ramp=%.0fA→Cx=%.0fA v_head=%.0f",
                           ramp_cur, cx, v_head);
                  goto publish_dis;
                }

                if (plateau || at_max) {
                  cx = max_i;
                  ceiling = std::max(1.0f, std::min(cx,
                              (float)(int)calc_cx(CX_SAFE_RATIO, -1.0f)));
                  state = 1;
                  id(g_dis_cx) = cx; id(g_dis_ceiling) = ceiling; id(g_dis_state) = 1;
                  current_out_a = ceiling;
                  ESP_LOGI("DIS", "EXIT2[%s]: B=%.1fA gap=%.1fA→Cx=max ceil=%.0fA v_head=%.0f",
                           plateau?"plateau":"at_max", i_actual, c_gap, ceiling, v_head);
                  goto publish_dis;
                }

                if ((now - ramp_last_ms) >= STEP_INT_MS) {
                  ramp_cur     = std::min(max_i, ramp_cur + step_a);
                  ramp_last_ms = now;
                  current_out_a = ramp_cur;
                  ESP_LOGI("DIS", "RAMP →%.1fA B=%.1fA gap=%.1fA", ramp_cur, i_actual, c_gap);
                }
              }
              goto publish_dis;
            }

            if (state == 1) {
              float k_ceil;
              if (below_uvp) {
                k_ceil = 0.0f;
              } else if (unsafe_zone) {
                float candidate = calc_cx(CX_UNSAFE_RATIO, -1.0f);
                k_ceil = std::min(ceiling, candidate);
              } else {
                float v_based = std::min(cx, (float)(int)calc_cx(CX_SAFE_RATIO, -1.0f));
                k_ceil = (cx >= max_i - 0.5f) ? v_based : std::min(ceiling, v_based);
              }

              float new_ceil = std::max(0.0f, k_ceil);
              if (std::abs(new_ceil - ceiling) > 0.9f) {
                ESP_LOGI("DIS", "ADAP%s %.0f→%.0fA v_head=%.0f k=%.2f [%s/%s]",
                         new_ceil > ceiling ? "↑" : "↓",
                         ceiling, new_ceil, v_head, k_est,
                         unsafe_zone ? "UNSAFE" : "SAFE",
                         cx >= max_i - 0.5f ? "TRACK" : "CAP");
                ceiling = new_ceil;
                id(g_dis_ceiling) = ceiling;
              }
              current_out_a = ceiling;

              if (ceiling < 0.5f) {
                current_out_a = 0.0f; state = 2; ceiling = 0.0f;
                id(g_dis_state) = 2; id(g_dis_ceiling) = 0.0f;
                id(discharging_a) = 0;
                ESP_LOGW("DIS", "ADAP→STOP: ceil→0 v_head=%.0f smv=%.0f", v_head, smv);
                goto publish_dis;
              }

              if ((now - log_ms) > 30000UL) {
                log_ms = now;
                ESP_LOGI("DIS", "ADAPTIVE: ceil=%.0fA cx=%.0fA v_head=%.0f k=%.2f [%s]",
                         ceiling, cx, v_head, k_est,
                         cx >= max_i - 0.5f ? "TRACK" : "CAP");
              }
              goto publish_dis;
            }

            if (state == 2) {
              current_out_a = 0.0f;
              id(discharging_a) = 0;
              if ((now - log_ms) > 15000UL) {
                log_ms = now;
                ESP_LOGW("DIS", "STOPPED smv=%.0f v_head=%.0f", smv, v_head);
              }
              goto publish_dis;
            }

            publish_dis:
            current_out_a = std::max(0.0f, std::min(current_out_a, max_i));
            if (std::abs(current_out_a - last_published) >= 0.3f) {
              id(${name}_adaptive_discharging_current).publish_state(current_out_a);
              last_published = current_out_a;
              static const char* sn[] = {"SOFT","ADAP","STOP"};
              int s = id(g_dis_state);
              ESP_LOGI("DIS", "→%.0fA V=%.0f %s k=%.2f",
                       current_out_a, smv, s < 3 ? sn[s] : "?", k_est);
            }
            id(discharging_a) = (int)current_out_a;

  # =================================================================
  # CHARGE CONTROLLER V12
  # =================================================================
  - platform: copy
    source_id: max_cell_voltage
    name: "Adaptive Charge Control"
    id: ${name}_adaptive_charge_control
    internal: true
    on_value:
      then:
        - lambda: !lambda |-
            static float         vbuf[5]         = {0,0,0,0,0};
            static int           vbuf_idx        = 0;
            static bool          vbuf_ready      = false;
            static bool          first_run       = true;
            static bool          was_charging    = false;
            static bool          was_discharging = false;
            static float         current_out_a   = 0.0f;
            static float         last_published  = -1.0f;
            static unsigned long soft_start_ms   = 0;
            static unsigned long ramp_last_ms    = 0;
            static unsigned long log_ms          = 0;
            static float         ramp_cur        = 5.0f;
            static unsigned long below_cterm_ms  = 0;
            static unsigned long cterm_check_ms  = 0;

            static const unsigned long STARTUP_HOLD_MS = 10000UL;
            static const unsigned long SOFT_START_MS   = 3000UL;
            static const unsigned long STEP_FREE_MS    = 5000UL;
            static const unsigned long STEP_APPR_MS    = 3000UL;
            static const float         PROBE_A         = 5.0f;
            static const float         PLATEAU_GAP_A   = 3.0f;
            static const float         TAPER_EXP       = 2.0f;
            static const float         FREE_ZONE_RATIO = 1.50f;

            if (isnan(x) || isnan(id(current).state)) return;
            float raw_mv      = x * 1000.0f;
            float current_val = id(current).state;
            unsigned long now = millis();

            vbuf[vbuf_idx] = raw_mv;
            vbuf_idx = (vbuf_idx + 1) % 5;
            if (!vbuf_ready && vbuf_idx == 0) vbuf_ready = true;
            int n = vbuf_ready ? 5 : std::max(1, vbuf_idx);
            float smv = 0;
            for (int i = 0; i < n; i++) smv += vbuf[i];
            smv /= n;

            float ovp            = id(can_over_voltage_protection).state;
            float gap            = id(${name}_voltage_recovery_gap).state;
            float max_i          = id(charging_current).state;
            bool  auto_mode      = id(can_switch_auto_charge_current).state;
            bool  chg_enabled    = id(switch_charging).state;
            bool  above_ovp      = (raw_mv >= ovp);
            float v_head         = ovp - smv;
            float taper_start    = ovp - gap;
            bool  unsafe_zone    = (!above_ovp && v_head < gap);
            bool  free_zone      = (v_head > gap * FREE_ZONE_RATIO);
            float step_a         = std::max(2.0f, max_i * 0.05f);
            bool  is_charging    = current_val >  0.5f;
            bool  is_discharging = current_val < -0.5f;

            float cap_ah   = id(total_battery_capacity_setting).state;
            float c_term_a = (!isnan(cap_ah) && cap_ah > 0) ? cap_ah / 20.0f : 14.0f;
            c_term_a = std::max(2.0f, std::min(15.0f, c_term_a));

            int   state   = id(g_chg_state);
            float cx      = id(g_chg_cx);
            float ceiling = id(g_chg_ceiling);

            if (first_run) {
              for (int i = 0; i < 5; i++) vbuf[i] = raw_mv;
              vbuf_ready = true; smv = raw_mv; first_run = false;
              current_out_a = 0.0f;
              if (id(g_startup_ms) == 0) {
                id(g_startup_ms)   = (uint32_t)now;
                id(g_startup_done) = false;
              }
              id(charging_a) = 0;
              id(${name}_adaptive_charging_current).publish_state(0.0f);
              last_published = 0.0f;
              ESP_LOGI("CHG", "BOOT V=%.0fmV", smv);
              return;
            }

            if (!id(g_startup_done)) {
              id(charging_a) = 5;
              if ((now - (unsigned long)id(g_startup_ms)) >= STARTUP_HOLD_MS) {
                id(g_startup_done) = true;
                ESP_LOGI("CHG", "STARTUP DONE");
              }
              return;
            }

            if (!auto_mode) {
              current_out_a = chg_enabled ? max_i : 0.0f;
              goto publish_chg;
            }

            if (is_discharging && !was_discharging) {
              ESP_LOGI("CHG", "DIR→DIS: reset state=%d", state);
              state = 0; cx = -1.0f; ceiling = -1.0f;
              id(g_chg_state) = 0; id(g_chg_cx) = -1.0f; id(g_chg_ceiling) = -1.0f;
              id(g_dis_state) = 0; id(g_dis_cx) = -1.0f; id(g_dis_ceiling) = -1.0f;
            }
            was_discharging = is_discharging;

            if (!is_charging) {
              was_charging = false;
              current_out_a = 0.0f;
              goto publish_chg;
            }

            if (is_charging && !was_charging) {
              state = 0; cx = -1.0f; ceiling = -1.0f;
              ramp_cur = std::min(PROBE_A, max_i);
              soft_start_ms = now; ramp_last_ms = now;
              below_cterm_ms = 0; cterm_check_ms = now;
              id(g_chg_state) = 0; id(g_chg_cx) = -1.0f; id(g_chg_ceiling) = -1.0f;
              ESP_LOGI("CHG", "SESSION smv=%.0f zone=%s v_head=%.0f",
                       smv, above_ovp?"ABOVE":unsafe_zone?"UNSAFE":free_zone?"FREE":"APPR", v_head);
            }
            was_charging = is_charging;

            if (state == 0) {
              if (!chg_enabled || above_ovp) {
                cx = 0.0f; state = 2; ceiling = 0.0f;
                id(g_chg_cx) = 0.0f; id(g_chg_state) = 2; id(g_chg_ceiling) = 0.0f;
                current_out_a = 0.0f;
                ESP_LOGW("CHG", "SOFT→STOP: %s smv=%.0f",
                         above_ovp?"above_ovp":"disabled", smv);
                goto publish_chg;
              }

              if (unsafe_zone) {
                cx = std::min(5.0f, max_i); ceiling = cx; state = 1;
                id(g_chg_cx) = cx; id(g_chg_ceiling) = ceiling; id(g_chg_state) = 1;
                current_out_a = cx;
                ESP_LOGI("CHG", "SOFT→ADAP(unsafe): Cx=5A v_head=%.0f", v_head);
                goto publish_chg;
              }

              current_out_a = ramp_cur;
              if ((now - soft_start_ms) < SOFT_START_MS) goto publish_chg;

              {
                float i_actual = current_val;
                float c_gap    = ramp_cur - i_actual;
                bool  plateau  = (c_gap >= PLATEAU_GAP_A && i_actual > 2.0f);
                bool  at_max   = (ramp_cur >= max_i - 0.5f);

                if (unsafe_zone) {
                  cx = ramp_cur; ceiling = cx; state = 1;
                  id(g_chg_cx) = cx; id(g_chg_ceiling) = ceiling; id(g_chg_state) = 1;
                  current_out_a = ceiling;
                  ESP_LOGI("CHG", "EXIT1[volt rise]: ramp=%.0fA→Cx=%.0fA v_head=%.0f",
                           ramp_cur, cx, v_head);
                  goto publish_chg;
                }

                if (plateau || at_max) {
                  cx = max_i; ceiling = cx; state = 1;
                  id(g_chg_cx) = cx; id(g_chg_ceiling) = ceiling; id(g_chg_state) = 1;
                  current_out_a = ceiling;
                  ESP_LOGI("CHG", "EXIT2[%s]: B=%.1fA gap=%.1fA→Cx=max=%.0fA v_head=%.0f",
                           plateau?"plateau":"at_max", i_actual, c_gap, cx, v_head);
                  goto publish_chg;
                }

                unsigned long step_int = free_zone ? STEP_FREE_MS : STEP_APPR_MS;
                if ((now - ramp_last_ms) >= step_int) {
                  ramp_cur     = std::min(max_i, ramp_cur + step_a);
                  ramp_last_ms = now;
                  current_out_a = ramp_cur;
                  ESP_LOGI("CHG", "RAMP[%s] →%.1fA B=%.1fA gap=%.1fA",
                           free_zone?"FREE":"APPR", ramp_cur, i_actual, c_gap);
                }
              }
              goto publish_chg;
            }

            if (state == 1) {
              float k_ceil;
              if (above_ovp) {
                k_ceil = 0.0f;
              } else if (unsafe_zone) {
                if (cx >= max_i - 0.5f) {
                  float pos = std::max(0.0f, std::min(1.0f,
                                (smv - taper_start) / gap));
                  k_ceil = (float)(int)(max_i * std::pow(1.0f - pos, TAPER_EXP));
                  k_ceil = std::max(0.0f, k_ceil);
                } else {
                  float candidate = (float)(int)((v_head / gap) * cx * 0.5f);
                  k_ceil = std::min(ceiling, std::max(0.0f, candidate));
                }
              } else {
                k_ceil = ceiling;
              }

              float new_ceil = std::max(0.0f, k_ceil);
              if (std::abs(new_ceil - ceiling) > 0.9f) {
                float pos = unsafe_zone ? (smv - taper_start) / gap : 0.0f;
                ESP_LOGI("CHG", "ADAP%s %.0f→%.0fA pos=%.2f v_head=%.0f [%s/%s]",
                         new_ceil > ceiling ? "↑" : "↓",
                         ceiling, new_ceil, pos, v_head,
                         unsafe_zone ? "UNSAFE" : "SAFE",
                         cx >= max_i - 0.5f ? "TRACK" : "CAP");
                ceiling = new_ceil;
                id(g_chg_ceiling) = ceiling;
              }
              current_out_a = ceiling;

              if (ceiling < 0.5f) {
                current_out_a = 0.0f; state = 2; ceiling = 0.0f;
                id(g_chg_state) = 2; id(g_chg_ceiling) = 0.0f; id(charging_a) = 0;
                ESP_LOGW("CHG", "ADAP→STOP: ceil→0 smv=%.0f", smv);
                goto publish_chg;
              }

              if (smv >= taper_start) {
                unsigned long dt = now - cterm_check_ms;
                cterm_check_ms = now;
                if (is_charging && current_val > 0 && current_val < c_term_a) {
                  below_cterm_ms += dt;
                  if (below_cterm_ms >= 60000UL) {
                    current_out_a = 0.0f; state = 2; ceiling = 0.0f;
                    id(g_chg_state) = 2; id(g_chg_ceiling) = 0.0f; id(charging_a) = 0;
                    id(${name}_eoc) = true;
                    id(report_soc) = 100;
                    id(charge_status) = "FULL";
                    id(${name}_cc_memory_valid) = false;
                    auto t = id(my_time).now();
                    if (t.is_valid()) id(${name}_eoc_timestamp) = t.timestamp;
                    id(cv_counter) = id(cv_counter) + 1;
                    ESP_LOGI("CHG", "EOC C/20: V=%.0fmV I=%.1fA < %.1fA",
                             smv, current_val, c_term_a);
                    goto publish_chg;
                  }
                } else {
                  below_cterm_ms = 0;
                }
              } else {
                below_cterm_ms = 0; cterm_check_ms = now;
              }

              if ((now - log_ms) > 30000UL) {
                log_ms = now;
                float pos = unsafe_zone ? (smv - taper_start) / gap : 0.0f;
                ESP_LOGI("CHG", "ADAPTIVE: ceil=%.0fA pos=%.2f v_head=%.0f [%s/%s]",
                         ceiling, pos, v_head,
                         unsafe_zone ? "UNSAFE" : "SAFE",
                         cx >= max_i - 0.5f ? "TRACK" : "CAP");
              }
              goto publish_chg;
            }

            if (state == 2) {
              current_out_a = 0.0f;
              id(charging_a) = 0;
              if ((now - log_ms) > 15000UL) {
                log_ms = now;
                ESP_LOGW("CHG", "STOPPED smv=%.0f v_head=%.0f", smv, v_head);
              }
              goto publish_chg;
            }

            publish_chg:
            current_out_a = std::max(0.0f, std::min(current_out_a, max_i));
            if (std::abs(current_out_a - last_published) >= 0.3f) {
              id(${name}_adaptive_charging_current).publish_state(current_out_a);
              last_published = current_out_a;
              static const char* sn[] = {"SOFT","ADAP","STOP"};
              int s = id(g_chg_state);
              ESP_LOGI("CHG", "→%.0fA V=%.0f %s", current_out_a, smv, s < 3 ? sn[s] : "?");
            }
            id(charging_a) = (int)current_out_a;

  # =================================================================
  # CVL / DVL CALCULATOR
  # =================================================================
  # Logic cố ý đơn giản — KHÔNG dynamic:
  #   CVL = max_charge_voltage × cells
  #         User chỉnh slider khi muốn tăng dòng solar.
  #         CCL adaptive lo CV phase, BMS OVP là safety backstop.
  #   DVL = (UVP + gap × 0.5) × cells
  #         Inverter stop discharge trước UVP taper của DCL adaptive.
  # Rate limit ±0.5V/s → tránh DC bus spike khi chỉnh slider.
  # Output: g_cvl_v / g_dvl_v (globals.yaml) → transport layer.
  # =================================================================
  - platform: copy
    source_id: max_cell_voltage
    name: "CVL Calculator"
    id: ${name}_cvl_calculator
    internal: true
    on_value:
      then:
        - lambda: !lambda |-
            static const float CV_RATE_MAX = 0.5f;
            static float last_cvl = -1.0f;
            static float last_dvl = -1.0f;

            if (isnan(x)) return;

            float cells = (!isnan(id(battery_strings).state) &&
                            id(battery_strings).state > 0)
                          ? id(battery_strings).state : 16.0f;

            float max_chg_mv = id(max_charge_voltage).state;
            float uvp_mv     = id(can_under_voltage_protection).state;
            float gap_mv     = id(${name}_voltage_recovery_gap).state;

            if (isnan(max_chg_mv) || isnan(uvp_mv) || isnan(gap_mv) ||
                max_chg_mv <= 0  || uvp_mv <= 0    || gap_mv <= 0)
              return;

            float cvl_v = (max_chg_mv / 1000.0f) * cells;
            float dvl_v = ((uvp_mv + gap_mv * 0.5f) / 1000.0f) * cells;

            if (last_cvl < 0.0f) { last_cvl = cvl_v; last_dvl = dvl_v; }

            float dc = cvl_v - last_cvl;
            if      (dc >  CV_RATE_MAX) cvl_v = last_cvl + CV_RATE_MAX;
            else if (dc < -CV_RATE_MAX) cvl_v = last_cvl - CV_RATE_MAX;
            last_cvl = cvl_v;

            float dd = dvl_v - last_dvl;
            if      (dd >  CV_RATE_MAX) dvl_v = last_dvl + CV_RATE_MAX;
            else if (dd < -CV_RATE_MAX) dvl_v = last_dvl - CV_RATE_MAX;
            last_dvl = dvl_v;

            id(g_cvl_v) = cvl_v;
            id(g_dvl_v) = dvl_v;

            static float prev_cvl = -1.0f;
            static float prev_dvl = -1.0f;
            if (std::abs(cvl_v - prev_cvl) > 0.05f ||
                std::abs(dvl_v - prev_dvl) > 0.05f) {
              ESP_LOGI("CVL", "CVL=%.2fV (%.0fmV×%.0f) DVL=%.2fV (UVP=%.0f+%.0f)",
                       cvl_v, max_chg_mv, cells, dvl_v, uvp_mv, gap_mv * 0.5f);
              prev_cvl = cvl_v; prev_dvl = dvl_v;
            }

  - platform: template
    name: "CVL Pack Voltage"
    id: ${name}_cvl_pack_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    update_interval: 10s
    lambda: |-
      float v = id(g_cvl_v);
      return (v > 0.0f) ? v : NAN;

  - platform: template
    name: "DVL Pack Voltage"
    id: ${name}_dvl_pack_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    update_interval: 10s
    lambda: |-
      float v = id(g_dvl_v);
      return (v > 0.0f) ? v : NAN;

# =================================================================
# STATUS SENSORS
# =================================================================
text_sensor:
  - platform: template
    name: "CCCV Phase"
    id: ${name}_adaptive_status
    update_interval: 2s
    lambda: |-
      if (!id(g_startup_done)) {
        long rem = 10000L - (long)(millis() - (unsigned long)id(g_startup_ms));
        if (rem < 0) rem = 0;
        return {"STARTUP " + to_string((int)(rem/1000)) + "s"};
      }
      float cur    = id(current).state;
      float max_mv = id(max_cell_voltage).state * 1000.0f;
      float min_mv = id(min_cell_voltage).state * 1000.0f;
      float ovp    = id(can_over_voltage_protection).state;
      float uvp    = id(can_under_voltage_protection).state;
      float gap    = id(${name}_voltage_recovery_gap).state;
      float cap_ah = id(total_battery_capacity_setting).state;
      float c_term = (!isnan(cap_ah) && cap_ah > 0) ? cap_ah / 20.0f : 14.0f;
      static const char* sn[] = {"SOFT","ADAP","STOP"};
      std::string s;
      if (cur > 0.5f) {
        int   st   = id(g_chg_state);
        float ci   = id(${name}_adaptive_charging_current).state;
        float ceil = id(g_chg_ceiling);
        float vhc  = ovp - max_mv;
        if (st == 2 && id(${name}_eoc))
          return {"FULL EOC C/20=" + to_string((int)c_term) + "A"};
        s = "CHG " + std::string(st < 3 ? sn[st] : "?");
        s += " " + to_string((int)ci) + "A";
        if (st == 1) s += " [Cx=" + to_string((int)ceil) + "A h=" + to_string((int)vhc) + "mV]";
      } else if (cur < -0.5f) {
        int   st   = id(g_dis_state);
        float di   = id(${name}_adaptive_discharging_current).state;
        float ceil = id(g_dis_ceiling);
        float vhd  = min_mv - uvp;
        float k    = id(g_dis_k_est);
        s = "DIS " + std::string(st < 3 ? sn[st] : "?");
        s += " " + to_string((int)di) + "A";
        if (st == 1) s += " [Cx=" + to_string((int)ceil) + "A h="
                       + to_string((int)vhd) + "mV k=" + to_string((int)(k*10)) + "]";
      } else {
        s = "IDLE";
      }
      if (max_mv > ovp - 20) s += " OVP!";
      if (min_mv < uvp + 20) s += " UVP!";
      return {s};

  - platform: template
    name: "Battery Health"
    id: ${name}_battery_health
    update_interval: 30s
    lambda: |-
      float dv = (id(max_cell_voltage).state - id(min_cell_voltage).state) * 1000.0f;
      std::string h;
      if      (dv <  5.0f) h = "EXCELLENT";
      else if (dv < 15.0f) h = "GOOD";
      else if (dv < 30.0f) h = "FAIR";
      else                  h = "POOR";
      return {h + " (dV=" + to_string((int)dv) + "mV)"};

  - platform: template
    name: "LFP Settings Check"
    id: ${name}_chemistry_check
    update_interval: 30s
    lambda: |-
      float ovp  = id(can_over_voltage_protection).state;
      float uvp  = id(can_under_voltage_protection).state;
      float gap  = id(${name}_voltage_recovery_gap).state;
      float mcv  = id(max_charge_voltage).state;
      std::vector<std::string> w;
      if (ovp > 3650.0f) w.push_back("OVP>3650 HUY HOAI!");
      if (uvp < 2500.0f) w.push_back("UVP<2500 HUY HOAI!");
      if (ovp > 3550.0f && ovp <= 3650.0f) w.push_back("OVP>3550 tuoi tho giam");
      if (uvp < 2800.0f && uvp >= 2500.0f) w.push_back("UVP<2800 xa sau");
      if (mcv > ovp) w.push_back("MaxChgV>OVP: BMS se ngat lien tuc!");
      float td = uvp + gap, tc = ovp - gap;
      if (td >= ovp) w.push_back("UVP+gap>=OVP!");
      if (tc <= uvp) w.push_back("OVP-gap<=UVP!");
      float mid = tc - td;
      if (mid < 20.0f) w.push_back("Normal zone " + to_string((int)mid) + "mV narrow");
      if (w.empty()) {
        float range = ovp - uvp;
        return {"OK range=" + to_string((int)range)
                + " td=" + to_string((int)td)
                + " tc=" + to_string((int)tc)
                + " mid=" + to_string((int)mid)};
      }
      std::string r;
      for (auto& s : w) r += s + " | ";
      return {r};