# =================================================================
# ADAPTIVE BATTERY CONTROL SYSTEM - V4.5 (CCCV + AUTONOMOUS)
# =================================================================
# Changes from V4.4:
#  [V1] Session interruption memory (90s RAM-only window)
#       → resumes at 80% of last CC after short solar gap
#       → lost on reset by design → probe re-runs safely
#  [V2] C/20 CV termination → report_soc=100 (autonomous EOC)
#       → uses actual JK BMS current (Hall sensor, reliable)
#       → eoc_timestamp saved (flash, once/day max)
#  [V3] Zone-based probe steps (faster CC ramp-up from reset)
#       → >150mV from OVP: 15% max_i every 5s
#       → 50-150mV: 8% max_i every 10s
#       → <50mV: 3% max_i every 10s
#  [V4] EMA smoothing (alpha=0.15) replacing RAMP_DOWN/UP
#       → min(instant, EMA): fast drop, slow rise
#  [V5] Deadband ±0.5A (prevents micro-hunting near target)
#  [V6] SOC filter Case 3 voltage gate
#       → continue discharge only if margin > gap
#  [V7] SOC filter race condition fix
#       → discharging_a=0 removed, g_force_dis_stop used instead
# =================================================================

globals:
  - id: g_startup_done
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_startup_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: g_dis_phase
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_dis_ceiling
    type: float
    restore_value: no
    initial_value: '-1.0'
  - id: g_dis_k_est
    type: float
    restore_value: yes
    initial_value: '4.0'
  - id: g_force_dis_stop
    type: bool
    restore_value: no
    initial_value: 'false'

# ─────────────────────────────────────────────────────────────────
# [L1] LFP DOD PROFILE SELECT
# ─────────────────────────────────────────────────────────────────
select:
  - platform: template
    name: "${name} LFP DOD Profile"
    id: ${name}_battery_chemistry
    options:
      - "LFP Conservative (DOD 65%)"
      - "LFP Balanced (DOD 70%)"
      - "LFP Performance (DOD 80%)"
    initial_option: "LFP Balanced (DOD 70%)"
    restore_value: true
    optimistic: true
    on_value:
      then:
        - lambda: |-
            if (x == "LFP Conservative (DOD 65%)") {
              ESP_LOGI("LFP", "Profile: CONSERVATIVE");
              ESP_LOGI("LFP", "  → OVP=3400mV UVP=3200mV gap=100mV sag=10mV SOC_stop=25%%");
            } else if (x == "LFP Balanced (DOD 70%)") {
              ESP_LOGI("LFP", "Profile: BALANCED ← solar ESS");
              ESP_LOGI("LFP", "  → OVP=slider UVP=3200mV gap=80mV sag=10mV SOC_stop=20%%");
            } else {
              ESP_LOGI("LFP", "Profile: PERFORMANCE");
              ESP_LOGI("LFP", "  → OVP=slider UVP=3100mV gap=80mV sag=10mV SOC_stop=15%%");
            }

# ─────────────────────────────────────────────────────────────────
# SAG COMPENSATION
# Default 10mV — calibrated for ~25A operation on 280Ah 16S pack
# Increase if seeing premature taper at mid-plateau
# ─────────────────────────────────────────────────────────────────
number:
  - platform: template
    name: "${name} Sag Compensation mV"
    id: ${name}_sag_compensation_mv
    min_value: 0
    max_value: 80
    step: 5
    initial_value: 10
    restore_value: true
    optimistic: true
    unit_of_measurement: "mV"
    icon: mdi:lightning-bolt-circle

sensor:
  # ── Output sensors ──────────────────────────────────────────
  - platform: template
    name: "${name} Adaptive Charging Current"
    id: ${name}_adaptive_charging_current
    unit_of_measurement: "A"
    accuracy_decimals: 1
    device_class: current
    state_class: measurement

  - platform: template
    name: "${name} Adaptive Discharging Current"
    id: ${name}_adaptive_discharging_current
    unit_of_measurement: "A"
    accuracy_decimals: 1
    device_class: current
    state_class: measurement

  # ── SOC Copy Filter ─────────────────────────────────────────
  # [V6] Case 3: voltage-gated (not raw JK SOC)
  # [V7] Case 2: g_force_dis_stop instead of direct discharging_a=0
  # ────────────────────────────────────────────────────────────
  - platform: copy
    source_id: capacity_remaining
    name: "${name} capacity_remaining"
    id: "${name}_capacity_remaining"
    unit_of_measurement: "%"
    device_class: battery
    internal: true
    filters:
      lambda: !lambda |-
        if (isnan(id(max_cell_voltage).state) || isnan(id(min_cell_voltage).state) ||
            isnan(id(capacity_remaining).state)) {
          ESP_LOGW("Battery", "Invalid sensor readings detected");
          return NAN;
        }
        uint16_t max_cell_voltage_i = id(max_cell_voltage).state * 1000.0;
        uint16_t min_cell_voltage_i = id(min_cell_voltage).state * 1000.0;
        uint16_t soc = id(capacity_remaining).state;

        // CASE 1: BMS says 100% — voltage-gated
        if (soc >= 98) {
          if (max_cell_voltage_i <= id(can_over_voltage_protection).state) {
            soc = 98;  // voltage still safe → keep charging
          }
          // else: voltage unsafe → soc stays 100 → inverter stops
        } else {
          // CASE 2: Voltage unsafe → stop discharge
          // [V7] Use flag instead of direct write to avoid race condition
          if (min_cell_voltage_i < id(can_under_voltage_protection).state) {
            id(g_force_dis_stop) = true;  // [V7] was: id(discharging_a) = 0
            soc = id(can_soc_stop_discharging).state;

          // CASE 3: JK SOC at floor but voltage still safe
          // [V6] Voltage-gated: only continue if margin > gap
          } else if (id(capacity_remaining).state <= id(can_soc_stop_discharging).state) {
            float margin_mv = id(min_cell_voltage).state * 1000.0f
                              - id(can_under_voltage_protection).state;
            float gap_mv    = id(${name}_voltage_recovery_gap).state;
            if (margin_mv > gap_mv) {
              // Voltage has good margin → JK SOC probably pessimistic → continue
              soc = id(can_soc_stop_discharging).state + 1;
            } else {
              // Voltage marginal → trust voltage, stop
              soc = id(can_soc_stop_discharging).state;
            }
          } else {
            soc = uint16_t(id(capacity_remaining).state);
          }
        }
        id(report_soc) = soc;
        return soc;

  # =================================================================
  # CHARGING CONTROL V4.5
  # Triggered by: max_cell_voltage
  # =================================================================
  - platform: copy
    source_id: max_cell_voltage
    name: "${name} Adaptive Charge Control"
    id: ${name}_adaptive_charge_control
    internal: true
    on_value:
      then:
        - lambda: !lambda |-

            // ══════════════════════════════════════════════
            // STATIC STATE
            // ══════════════════════════════════════════════
            static float vbuf[5]                 = {0,0,0,0,0};
            static int   vbuf_idx                = 0;
            static bool  vbuf_ready              = false;
            static bool  first_run               = true;

            static bool  was_charging            = false;
            static bool  probe_active            = false;
            static bool  probe_done              = false;
            static unsigned long probe_last_step = 0;
            static bool  prev_auto_mode          = true;
            static bool  switch_chg_locked       = false;
            static bool          in_cooldown_chg = false;
            static unsigned long cooldown_start_chg = 0;
            static float ovp_trip_ceiling        = -1.0f;
            static float current_out_a           = 5.0f;
            static float last_published          = -1.0f;
            static unsigned long last_adj        = 0;

            // [V2] CV termination tracking
            static bool          cv_entered_local  = false;
            static unsigned long below_cterm_ms    = 0;
            static unsigned long last_cterm_check  = 0;

            // [V4] EMA smoothing state
            static float ema_target_chg            = 5.0f;

            // ── CONSTANTS ──────────────────────────────────
            static const unsigned long STARTUP_HOLD_MS  = 10000UL;
            static const unsigned long PROBE_STEP_MS    = 10000UL;
            static const float         PROBE_START_A    = 5.0f;
            static const float         TAPER_EXPONENT   = 1.5f;
            static const float         MIN_TAPER_FACTOR = 0.05f;
            static const unsigned long MIN_ADJ_MS       = 2000UL;
            static const unsigned long COOLDOWN_MS      = 30000UL;
            static const float         CEILING_DECAY    = 0.70f;
            static const float         CEILING_MIN_A    = 1.0f;
            // [V1] Interruption memory window
            static const unsigned long CC_MEMORY_MS     = 90000UL;
            static const float         CC_RESUME_FACTOR = 0.80f;

            // ── INPUT GUARD ────────────────────────────────
            if (isnan(x) || isnan(id(current).state)) {
              ESP_LOGW("CHG_V4", "NaN, skip");
              return;
            }

            float raw_mv      = x * 1000.0f;
            float current_val = id(current).state;
            unsigned long now = millis();

            // ── VOLTAGE SMOOTHING ──────────────────────────
            vbuf[vbuf_idx] = raw_mv;
            vbuf_idx = (vbuf_idx + 1) % 5;
            if (!vbuf_ready && vbuf_idx == 0) vbuf_ready = true;
            int n = vbuf_ready ? 5 : std::max(1, vbuf_idx);
            float smv = 0;
            for (int i = 0; i < n; i++) smv += vbuf[i];
            smv /= n;

            // ── SYSTEM PARAMETERS ──────────────────────────
            float ovp         = id(can_over_voltage_protection).state;
            float gap         = id(${name}_voltage_recovery_gap).state;
            float max_i       = id(charging_current).state;
            bool  auto_mode   = id(can_switch_auto_charge_current).state;
            bool  chg_enabled = id(switch_charging).state;
            float sag_v       = id(${name}_sag_compensation_mv).state;  // [fixed] mV not V
            float taper_start = ovp - gap;

            // [V2] C/20 termination threshold
            float cap_ah   = id(total_battery_capacity_setting).state;
            float c_term_a = (!isnan(cap_ah) && cap_ah > 0) ? cap_ah / 20.0f : 14.0f;
            c_term_a = std::max(2.0f, std::min(15.0f, c_term_a));

            float probe_start_a = std::max(5.0f, max_i * 0.05f);
            bool is_charging    = current_val > 0.5f;
            bool is_discharging = current_val < -0.5f;

            // ══════════════════════════════════════════════
            // [F1] FIRST RUN
            // ══════════════════════════════════════════════
            if (first_run) {
              for (int i = 0; i < 5; i++) vbuf[i] = raw_mv;
              vbuf_ready    = true;
              smv           = raw_mv;
              first_run     = false;
              current_out_a = probe_start_a;
              ema_target_chg = probe_start_a;  // [V4] seed EMA
              if (id(g_startup_ms) == 0) {
                id(g_startup_ms) = (uint32_t)now;
                ESP_LOGI("CHG_V4", "🔁 BOOT (CHG first): startup timer");
              }
              id(g_startup_done) = false;
              id(charging_a)    = (int)probe_start_a;
              id(discharging_a) = (int)probe_start_a;
              id(${name}_adaptive_charging_current).publish_state(current_out_a);
              last_published = current_out_a;
              ESP_LOGI("CHG_V4", "🔁 BOOT CHG: V=%.1fmV → HOLD %.0fA (10s)", smv, probe_start_a);
              return;
            }

            // ══════════════════════════════════════════════
            // [F1] STARTUP HOLD
            // ══════════════════════════════════════════════
            if (!id(g_startup_done)) {
              unsigned long elapsed = now - (unsigned long)id(g_startup_ms);
              if (elapsed < STARTUP_HOLD_MS) {
                id(charging_a)    = (int)probe_start_a;
                id(discharging_a) = (int)probe_start_a;
                return;
              }
              id(g_startup_done) = true;
              ESP_LOGI("CHG_V4", "✅ STARTUP DONE: %.2fA (%s)",
                       current_val, current_val > 0.5f ? "CHG" : (current_val < -0.5f ? "DIS" : "IDLE"));
            }

            // ══════════════════════════════════════════════
            // SWITCH RECOVERY + ANTI-HUNTING (unchanged)
            // ══════════════════════════════════════════════
            if (switch_chg_locked || in_cooldown_chg) {

              if (ovp_trip_ceiling >= 0.0f && ovp_trip_ceiling < CEILING_MIN_A) {
                if (auto_mode || is_discharging) {
                  switch_chg_locked = false;
                  in_cooldown_chg   = false;
                  ovp_trip_ceiling  = -1.0f;
                  id(switch_charging).turn_on();
                  was_charging = false;
                  ESP_LOGI("CHG_V4", "🔓 CHG FORCE-UNLOCK: ceiling reset by %s",
                           auto_mode ? "user→auto" : "dis_session");
                } else {
                  ESP_LOGW("CHG_V4", "🛑 CHG CEILING<%.1fA: chờ xả/auto", CEILING_MIN_A);
                  goto publish_chg;
                }
              }

              unsigned long elapsed_cd = now - cooldown_start_chg;
              bool cooldown_ok = !in_cooldown_chg || (elapsed_cd >= COOLDOWN_MS);
              bool v_recovered = (smv < ovp - gap * 1.5f);
              bool now_auto    = auto_mode;
              bool started_dis = is_discharging;

              if (!cooldown_ok) {
                if ((now % 5000) < 200)
                  ESP_LOGI("CHG_V4", "⏳ CHG COOLDOWN: %.0fs | V=%.1fmV",
                           (float)(COOLDOWN_MS - elapsed_cd) / 1000.0f, smv);
                goto publish_chg;
              }

              if (v_recovered || now_auto || started_dis) {
                switch_chg_locked = false;
                in_cooldown_chg   = false;
                id(switch_charging).turn_on();
                float safe_start = (ovp_trip_ceiling > 0.0f)
                                   ? std::min(probe_start_a, ovp_trip_ceiling)
                                   : probe_start_a;
                current_out_a  = safe_start;
                ema_target_chg = safe_start;  // [V4] seed EMA
                probe_active   = false;
                probe_done     = false;
                was_charging   = false;
                ESP_LOGI("CHG_V4", "🔓 CHG RE-ENABLED: %s | V=%.1fmV | %.1fA",
                         v_recovered ? "V_ok" : now_auto ? "auto" : "dis",
                         smv, safe_start);
              } else {
                if ((now % 5000) < 200)
                  ESP_LOGI("CHG_V4", "⏸ CHG WAIT: %.1fmV < %.1fmV needed",
                           smv, ovp - gap * 1.5f);
                goto publish_chg;
              }
            }

            // ══════════════════════════════════════════════
            // L1 HARD LIMIT: disabled or OVP
            // ══════════════════════════════════════════════
            if (!chg_enabled || smv >= ovp) {
              current_out_a = 0.0f;
              probe_active  = false;
              if (!chg_enabled) {
                ESP_LOGW("CHG_V4", "🚫 CHG DISABLED");
              } else {
                float trip_i = last_published > 0.0f ? last_published : probe_start_a;
                float new_ceiling = (ovp_trip_ceiling > 0.0f)
                                    ? ovp_trip_ceiling * CEILING_DECAY
                                    : trip_i * CEILING_DECAY;
                ovp_trip_ceiling   = std::max(0.0f, new_ceiling);
                in_cooldown_chg    = true;
                cooldown_start_chg = now;

                if (auto_mode) {
                  ESP_LOGW("CHG_V4", "🚨 OVP AUTO: %.1fmV %.1fA → SOC=100%% ceiling→%.1fA",
                           smv, trip_i, ovp_trip_ceiling);
                  id(capacity_remaining)->publish_state(100.0f);
                } else {
                  if (!switch_chg_locked) {
                    switch_chg_locked = true;
                    id(switch_charging).turn_off();
                    ESP_LOGW("CHG_V4", "🚨 OVP MANUAL: %.1fmV STOP+LOCK ceiling→%.1fA",
                             smv, ovp_trip_ceiling);
                  }
                }
              }
              goto publish_chg;
            }

            // ══════════════════════════════════════════════
            // [V1] SESSION DETECTION with interruption memory
            // ══════════════════════════════════════════════

            // Track when charging stops
            if (!is_charging && was_charging) {
              id(${name}_last_charge_end_ms) = (uint32_t)now;
              if (current_out_a > probe_start_a + 2.0f) {
                id(${name}_last_safe_cc_a) = current_out_a;
              }
              ESP_LOGI("CHG_V4", "⏹ CHG STOPPED: saved=%.1fA mem=%s",
                       id(${name}_last_safe_cc_a),
                       id(${name}_cc_memory_valid) ? "valid" : "none");
            }

            // New charge session edge
            if (is_charging && !was_charging) {
              unsigned long gap_ms = now - (unsigned long)id(${name}_last_charge_end_ms);
              cv_entered_local = false;
              below_cterm_ms   = 0;

              if (id(${name}_cc_memory_valid)
                  && gap_ms < CC_MEMORY_MS
                  && id(${name}_last_safe_cc_a) > probe_start_a) {
                // [V1] Short gap → resume at 80% of last known safe current
                current_out_a  = id(${name}_last_safe_cc_a) * CC_RESUME_FACTOR;
                current_out_a  = std::max(probe_start_a, current_out_a);
                probe_active   = false;
                probe_done     = true;
                ema_target_chg = current_out_a;  // [V4] seed EMA
                id(${name}_charge_phase) = 1;
                ESP_LOGI("CHG_V4", "⚡ RESUME: gap=%.0fs → %.1fA (last=%.1fA)",
                         (float)gap_ms / 1000.0f, current_out_a,
                         id(${name}_last_safe_cc_a));
              } else {
                // Full probe from 5A (post-reset or long gap)
                current_out_a  = probe_start_a;
                probe_active   = true;
                probe_done     = false;
                ema_target_chg = probe_start_a;
                id(${name}_charge_phase) = 1;
                ESP_LOGI("CHG_V4", "🔄 NEW SESSION: probe %.1fA (gap=%.0fs mem=%s)",
                         probe_start_a, (float)gap_ms / 1000.0f,
                         id(${name}_cc_memory_valid) ? "valid" : "none");
              }
              probe_last_step = now;
              last_adj        = now;
            }
            was_charging = is_charging;

            // ══════════════════════════════════════════════
            // [V2] EOC HOLD: prevent re-charge after full
            // ══════════════════════════════════════════════
            if (id(${name}_charge_phase) == 3) {
              if (smv < taper_start - 20.0f) {
                // Voltage dropped → allow new charge session
                id(${name}_charge_phase) = 0;
                id(${name}_eoc) = false;
                ESP_LOGI("CHG_V4", "🔄 POST-EOC: V=%.1fmV → allow charge", smv);
              } else {
                current_out_a = 0.0f;
                goto publish_chg;
              }
            }

            // ══════════════════════════════════════════════
            // TAPER ZONE: taper_start <= V < OVP
            // ══════════════════════════════════════════════
            if (is_charging && gap > 1.0f && smv >= taper_start) {

              // Probe entering taper zone
              if (probe_active) {
                probe_active = false;
                probe_done   = true;
                id(${name}_cc_memory_valid) = true;
                id(${name}_last_safe_cc_a)  = current_out_a;
                ema_target_chg = current_out_a;  // [V4] seed EMA
                ESP_LOGI("CHG_V4", "🔍 PROBE END → TAPER: %.1fA V=%.1fmV", current_out_a, smv);
              }

              // [V2] CV zone entry tracking
              if (!cv_entered_local) {
                cv_entered_local = true;
                last_cterm_check = now;
                id(${name}_charge_phase) = 2;
                id(cv_counter) = id(cv_counter) + 1;
                ESP_LOGI("CHG_V4", "📊 CV START: V=%.1fmV I=%.1fA C/20=%.1fA (total=%d)",
                         smv, current_val, c_term_a, id(cv_counter));
              }

              float pos = (smv - taper_start) / gap;
              pos = std::max(0.0f, std::min(1.0f, pos));
              float factor = std::pow(1.0f - pos, TAPER_EXPONENT);
              factor = std::max(factor, MIN_TAPER_FACTOR);

              if (auto_mode) {
                float target  = max_i * factor;
                bool  can_adj = (now - last_adj) >= MIN_ADJ_MS;
                if (can_adj) {
                  // [V4] EMA: fast drop, slow rise
                  ema_target_chg = 0.15f * target + 0.85f * ema_target_chg;
                  float smoothed = std::min(target, ema_target_chg);
                  // [V5] Deadband
                  if (std::abs(current_out_a - smoothed) >= 0.5f) {
                    current_out_a = smoothed;
                  }
                  last_adj = now;
                }
                ESP_LOGI("CHG_V4", "📉 TAPER: pos=%.2f → %.1fA (tgt=%.1fA)", pos, current_out_a, target);
              } else {
                current_out_a  = max_i;
                ema_target_chg = max_i;
                ESP_LOGI("CHG_V4", "📉 TAPER MANUAL: %.1fA", max_i);
              }

              // [V2] C/20 CV TERMINATION CHECK
              {
                unsigned long dt_ms = now - last_cterm_check;
                last_cterm_check = now;
                if (is_charging && !isnan(current_val) && current_val > 0 && current_val < c_term_a) {
                  below_cterm_ms += dt_ms;
                  if ((below_cterm_ms % 10000UL) < 1200UL)
                    ESP_LOGI("CHG_V4", "⏳ CV I=%.1fA < C/20=%.1fA | %.0fs/60s",
                             current_val, c_term_a, (float)below_cterm_ms / 1000.0f);
                  if (below_cterm_ms >= 60000UL) {
                    // ── CHARGE COMPLETE ──
                    current_out_a = 0.0f;
                    id(charging_a) = 0;
                    id(${name}_charge_phase) = 3;
                    id(${name}_eoc) = true;
                    id(report_soc) = 100;
                    id(charge_status) = "FULL";
                    id(${name}_cc_memory_valid) = false;
                    id(${name}_last_safe_cc_a)  = probe_start_a;
                    auto t = id(my_time).now();
                    if (t.is_valid()) id(${name}_eoc_timestamp) = t.timestamp;
                    ESP_LOGI("CHG_V4", "✅ EOC: V=%.1fmV I=%.1fA < C/20=%.1fA → SOC=100%%",
                             smv, current_val, c_term_a);
                    goto publish_chg;
                  }
                } else {
                  below_cterm_ms = 0;  // reset if current rises
                }
              }

              goto publish_chg;
            }

            // Not in taper zone → reset CV tracking
            if (cv_entered_local) {
              cv_entered_local = false;
              below_cterm_ms   = 0;
              if (id(${name}_charge_phase) == 2)
                id(${name}_charge_phase) = 1;
            }

            // ── EDGE DETECTION auto↔manual (unchanged) ────
            {
              bool switched_to_manual = ( prev_auto_mode && !auto_mode);
              bool switched_to_auto   = (!prev_auto_mode &&  auto_mode);
              prev_auto_mode = auto_mode;

              if (switched_to_manual) {
                probe_active   = false;
                probe_done     = true;
                current_out_a  = max_i;
                ema_target_chg = max_i;
                last_published = -1.0f;
                ESP_LOGI("CHG_V4", "🔧 → MANUAL: %.1fA", max_i);
              } else if (!auto_mode && std::abs(current_out_a - max_i) > 0.5f) {
                current_out_a  = max_i;
                ema_target_chg = max_i;
                last_published = -1.0f;
              } else if (switched_to_auto) {
                if (!probe_done) {
                  probe_active    = true;
                  probe_last_step = now;
                }
                ESP_LOGI("CHG_V4", "🔄 → AUTO: %.1fA probe=%s",
                         current_out_a, probe_active ? "active" : "done");
              }
            }

            // ── NORMAL ZONE ────────────────────────────────
            if (!is_charging) goto publish_chg;

            if (!auto_mode) {
              current_out_a  = max_i;
              ema_target_chg = max_i;
              goto publish_chg;
            }

            // ── [V3] PROBE PHASE: zone-based steps ─────────
            if (probe_active) {
              float dist_to_ovp = (ovp - smv) - sag_v;
              dist_to_ovp = std::max(0.0f, dist_to_ovp);

              // [V3] Zone-based step size and interval
              float probe_step_a;
              unsigned long step_interval;
              if (dist_to_ovp > 150.0f) {
                probe_step_a  = std::max(10.0f, max_i * 0.15f);  // 15%/5s — far zone
                step_interval = 5000UL;
              } else if (dist_to_ovp > 50.0f) {
                probe_step_a  = std::max(5.0f, max_i * 0.08f);   // 8%/10s — mid zone
                step_interval = PROBE_STEP_MS;
              } else {
                probe_step_a  = std::max(1.0f, max_i * 0.03f);   // 3%/10s — near zone
                step_interval = PROBE_STEP_MS;
              }

              float probe_ceil = (ovp_trip_ceiling > 0.0f) ? ovp_trip_ceiling : max_i;
              bool near_taper  = (smv >= taper_start - gap);
              bool at_max      = (current_out_a >= std::min(max_i, probe_ceil) - 0.5f);

              if (near_taper || at_max) {
                probe_active = false;
                probe_done   = true;
                id(${name}_cc_memory_valid) = true;
                id(${name}_last_safe_cc_a)  = current_out_a;
                ema_target_chg = current_out_a;  // [V4] seed EMA
                if (near_taper && ovp_trip_ceiling > 0.0f) {
                  ESP_LOGI("CHG_V4", "🟢 PROBE OK → ceiling reset (%.1fA→free)", ovp_trip_ceiling);
                  ovp_trip_ceiling = -1.0f;
                }
                ESP_LOGI("CHG_V4", "🔍 PROBE DONE: V=%.1fmV I=%.1fA reason=%s",
                         smv, current_out_a, near_taper ? "near_taper" : "at_max_i");
              } else {
                bool step_time = (now - probe_last_step) >= step_interval;
                if (step_time) {
                  float next_i = std::min({max_i, probe_ceil, current_out_a + probe_step_a});
                  ESP_LOGI("CHG_V4", "🔍 PROBE STEP: %.1fA→%.1fA (step=%.1fA, dist=%.0fmV, ceil=%.1fA)",
                           current_out_a, next_i, probe_step_a, dist_to_ovp, probe_ceil);
                  current_out_a   = next_i;
                  probe_last_step = now;
                }
                goto publish_chg;
              }
            }

            // ── [V4] ADAPTIVE PHASE: EMA smoothing ─────────
            {
              bool can_adj = (now - last_adj) >= MIN_ADJ_MS;
              if (can_adj) {
                float dist_real = ovp - smv;
                float dist_eff  = dist_real - sag_v;
                dist_eff = std::max(0.0f, dist_eff);
                float target;

                if (dist_eff > gap * 3) {
                  target = max_i;
                } else {
                  float scale = std::max(0.1f, dist_eff / (gap * 3));
                  target = max_i * scale;
                }
                target = std::max(max_i * 0.1f, std::min(max_i, target));

                // [V4] EMA: fast drop, slow rise
                ema_target_chg = 0.15f * target + 0.85f * ema_target_chg;
                float smoothed = std::min(target, ema_target_chg);

                // [V5] Deadband: skip micro-adjustments
                if (std::abs(current_out_a - smoothed) >= 0.5f) {
                  current_out_a = smoothed;
                  last_adj = now;

                  // [V1] Update interruption memory during stable operation
                  if (current_out_a > probe_start_a + 2.0f) {
                    id(${name}_last_safe_cc_a) = current_out_a;
                  }
                }

                ESP_LOGI("CHG_V4", "🎯 ADAPTIVE: dist_real=%.1fmV eff=%.1fmV tgt=%.1fA I=%.1fA",
                         dist_real, dist_eff, target, current_out_a);
              }
            }

            current_out_a = std::max(0.0f, std::min(current_out_a, max_i));

            publish_chg:
            current_out_a = std::max(0.0f, std::min(current_out_a, max_i));
            if (std::abs(current_out_a - last_published) >= 0.3f) {
              id(${name}_adaptive_charging_current).publish_state(current_out_a);
              last_published = current_out_a;
              ESP_LOGI("CHG_V4", "📡 CHG→%.1fA | V=%.1fmV | %s",
                       current_out_a, smv,
                       probe_active ? "PROBE" : (id(${name}_charge_phase)==2 ? "CV" : "ADAPTIVE"));
            }
            id(charging_a) = (int)current_out_a;

# =================================================================
  # DISCHARGE CONTROL V10r — CLEANED
  # Globals cần khai báo (thêm vào phần globals:):
  #   g_dis_phase:   int,   restore_value: no,  initial_value: '0'
  #   g_dis_ceiling: float, restore_value: no,  initial_value: '-1.0'
  #   g_dis_k_est:   float, restore_value: yes, initial_value: '4.0'
  # (g_startup_ms, g_startup_done, g_force_dis_stop đã có từ trước)
  # =================================================================
  - platform: copy
    source_id: min_cell_voltage
    name: "${name} Adaptive Discharge Control"
    id: ${name}_adaptive_discharge_control
    internal: true
    on_value:
      then:
        - lambda: !lambda |-

            // ── STATIC STATE ───────────────────────────────
            static float         vbuf[5]             = {0,0,0,0,0};
            static int           vbuf_idx            = 0;
            static bool          vbuf_ready          = false;
            static bool          first_run           = true;
            static bool          was_discharging     = false;
            static bool          was_charging        = false;
            static bool          switch_dis_locked   = false;
            static bool          in_cooldown_dis     = false;
            static unsigned long cooldown_start_dis  = 0;
            static float         uvp_trip_ceiling    = -1.0f;
            static float         current_out_a       = 5.0f;
            static float         last_published      = -1.0f;
            static bool          prev_auto_mode      = true;
            // Phase timing — phase_enter_ms reused làm k_log_ms sau PH0
            static unsigned long phase_enter_ms      = 0;
            static unsigned long ramp_last_ms        = 0;

            // K learning refs
            static float         k_v0               = 0.0f;
            static float         k_i0               = 0.0f;
            static unsigned long k_t0               = 0;

            // ── CONSTANTS ──────────────────────────────────
            static const unsigned long STARTUP_HOLD_MS  = 10000UL;
            static const unsigned long SOFT_START_MS    = 3000UL;
            static const unsigned long STEP_INT_NORM    = 3000UL;
            static const unsigned long STEP_INT_TAPER   = 5000UL;
            static const unsigned long COOLDOWN_MS      = 30000UL;
            static const float         CEILING_DECAY    = 0.70f;
            static const float         CEILING_MIN_A    = 1.0f;
            static const float         K_SAFETY_LOCK    = 0.70f;
            static const float         K_SAFETY_RATCH   = 0.65f;
            static const float         K_SAFETY_PROBE   = 0.85f;
            static const float         K_MIN            = 0.5f;
            static const float         K_MAX            = 50.0f;

            // ── INPUT GUARD ────────────────────────────────
            if (isnan(x) || isnan(id(current).state)) return;

            float raw_mv      = x * 1000.0f;
            float current_val = id(current).state;
            unsigned long now = millis();

            // ── VOLTAGE SMOOTHING ──────────────────────────
            vbuf[vbuf_idx] = raw_mv;
            vbuf_idx = (vbuf_idx + 1) % 5;
            if (!vbuf_ready && vbuf_idx == 0) vbuf_ready = true;
            int n = vbuf_ready ? 5 : std::max(1, vbuf_idx);
            float smv = 0;
            for (int i = 0; i < n; i++) smv += vbuf[i];
            smv /= n;

            // ── SYSTEM PARAMETERS ──────────────────────────
            float uvp         = id(can_under_voltage_protection).state;
            float gap         = id(${name}_voltage_recovery_gap).state;
            float max_i       = id(discharging_current).state;
            bool  auto_mode   = id(can_switch_auto_discharge_current).state;
            bool  dis_enabled = id(switch_discharging).state;
            float soc_stop    = id(can_soc_stop_discharging).state;
            float taper_start = uvp + gap;
            // [B1] Safe start: nếu sát UVP thì 1A, bình thường 5A
            float v_head_now    = smv - uvp;
            float probe_start_a = (v_head_now < gap * 0.3f) ? 1.0f
                                  : std::max(5.0f, max_i * 0.05f);
            float step_a        = std::max(2.0f, max_i * 0.05f);

            bool is_charging    = current_val > 0.5f;
            bool is_discharging = current_val < -0.5f;

            // Cache globals vào local — tránh gọi id() nhiều lần/tick
            int   ph      = id(g_dis_phase);
            float ceiling = id(g_dis_ceiling);
            float k_est   = id(g_dis_k_est);

            // ══════════════════════════════════════════════
            // FIRST RUN
            // ══════════════════════════════════════════════
            if (first_run) {
              for (int i = 0; i < 5; i++) vbuf[i] = raw_mv;
              vbuf_ready    = true;
              smv           = raw_mv;
              first_run     = false;
              current_out_a = probe_start_a;
              if (id(g_startup_ms) == 0) {
                id(g_startup_ms)   = (uint32_t)now;
                id(g_startup_done) = false;
              }
              // Fix startup lock: set charging_a chỉ nếu chưa được set bởi CHG lambda
              if (id(charging_a) == 0) id(charging_a) = (int)probe_start_a;
              id(discharging_a) = (int)probe_start_a;
              id(${name}_adaptive_discharging_current).publish_state(current_out_a);
              last_published = current_out_a;
              ESP_LOGI("DIS", "BOOT: V=%.0fmV k=%.2f", smv, k_est);
              return;
            }

            // ── STARTUP HOLD ───────────────────────────────
            if (!id(g_startup_done)) {
              if (id(charging_a) == 0) id(charging_a) = (int)probe_start_a;
              id(discharging_a) = (int)probe_start_a;
              if ((now - (unsigned long)id(g_startup_ms)) >= STARTUP_HOLD_MS) {
                id(g_startup_done) = true;
                ESP_LOGI("DIS", "STARTUP DONE");
              }
              return;
            }

            // ── [V7] FORCE STOP ────────────────────────────
            if (id(g_force_dis_stop)) {
              current_out_a = 0.0f;
              id(discharging_a) = 0;
              id(g_force_dis_stop) = false;
              goto publish_dis;
            }

            // ── HELPER MACRO: reset ratchet ────────────────
            // (dùng inline thay macro để tránh heap)
            // Gọi: ph=0; ceiling=-1.0f; id(g_dis_phase)=0; id(g_dis_ceiling)=-1.0f;

            // ══════════════════════════════════════════════
            // SWITCH RECOVERY + ANTI-HUNTING
            // ══════════════════════════════════════════════
            if (switch_dis_locked || in_cooldown_dis) {
              if (uvp_trip_ceiling >= 0.0f && uvp_trip_ceiling < CEILING_MIN_A) {
                if (auto_mode || is_charging) {
                  switch_dis_locked = false; in_cooldown_dis = false;
                  uvp_trip_ceiling  = -1.0f;
                  id(switch_discharging).turn_on();
                  was_discharging = false;
                  ceiling = -1.0f; ph = 0;
                  id(g_dis_ceiling) = -1.0f; id(g_dis_phase) = 0;
                } else { goto publish_dis; }
              }
              unsigned long ecd = now - cooldown_start_dis;
              if (in_cooldown_dis && ecd < COOLDOWN_MS) {
                if ((now % 5000) < 200)
                  ESP_LOGI("DIS", "COOLDOWN %.0fs", (float)(COOLDOWN_MS-ecd)/1000.0f);
                goto publish_dis;
              }
              if (smv > uvp + gap*1.5f || auto_mode || is_charging) {
                switch_dis_locked = false; in_cooldown_dis = false;
                id(switch_discharging).turn_on();
                float ss = (uvp_trip_ceiling > 0.0f)
                           ? std::min(probe_start_a, uvp_trip_ceiling) : probe_start_a;
                current_out_a = ss;
                was_discharging = false;
                plat_b_prev = 0.0f;  // reset plateau ref khi re-enable
                ceiling = -1.0f; ph = 0;
                id(g_dis_ceiling) = -1.0f; id(g_dis_phase) = 0;
                ESP_LOGI("DIS", "RE-ENABLE %.1fA V=%.0f", ss, smv);
              } else { goto publish_dis; }
            }

            // ── UVP HARD LIMIT ─────────────────────────────
            if (!dis_enabled || smv <= uvp) {
              current_out_a = 0.0f;
              if (dis_enabled) {
                float ti = last_published > 0.0f ? last_published : probe_start_a;
                uvp_trip_ceiling   = std::max(0.0f,
                  (uvp_trip_ceiling > 0.0f) ? uvp_trip_ceiling*CEILING_DECAY : ti*CEILING_DECAY);
                in_cooldown_dis    = true;
                cooldown_start_dis = now;
                if (auto_mode) {
                  id(capacity_remaining)->publish_state(soc_stop);
                  ESP_LOGW("DIS", "UVP %.0fmV→SOC%.0f%%", smv, soc_stop);
                } else if (!switch_dis_locked) {
                  switch_dis_locked = true;
                  id(switch_discharging).turn_off();
                  ESP_LOGW("DIS", "UVP MANUAL LOCK %.0fmV", smv);
                }
              }
              goto publish_dis;
            }

            // ── RESET CEILING khi đổi chiều xả→sạc ────────
            if (is_charging && !was_charging && ceiling >= 0.0f) {
              ESP_LOGI("DIS", "DIR→CHG reset ceil=%.1fA k=%.2f", ceiling, k_est);
              ceiling = -1.0f; ph = 0;
              id(g_dis_ceiling) = -1.0f; id(g_dis_phase) = 0;
            }
            was_charging = is_charging;

            // ── SESSION EDGE ───────────────────────────────
            if (is_discharging && !was_discharging) {
              current_out_a   = probe_start_a;
              phase_enter_ms  = now;  // PH0 timer (reused làm k_log sau PH0)
              ramp_last_ms    = now;
              ph = 0;
              k_v0 = smv; k_i0 = -current_val; k_t0 = now;
              id(g_dis_phase) = 0;
              // ceiling KHÔNG reset — chỉ reset khi chuyển sang sạc
              ESP_LOGI("DIS", "SESSION: ceil=%.1f k=%.2f", ceiling, k_est);
            }
            was_discharging = is_discharging;

            if (!is_discharging) goto publish_dis;

            // ── MANUAL MODE ────────────────────────────────
            {
              bool to_manual = (prev_auto_mode && !auto_mode);
              prev_auto_mode = auto_mode;
              if (to_manual) {
                current_out_a = max_i;
                ceiling = -1.0f; ph = 0;
                id(g_dis_ceiling) = -1.0f; id(g_dis_phase) = 0;
                last_published = -1.0f;
              }
            }
            if (!auto_mode) { current_out_a = max_i; goto publish_dis; }

            // ── [V10-K] K LEARNING (dùng chung PH1+PH2) ───
            // Chạy bất cứ khi nào đang xả, normal zone
            if (smv > taper_start) {
              float i_act = -current_val;
              float di = i_act - k_i0, dv = k_v0 - smv;
              unsigned long dt = now - k_t0;
              if (di >= 5.0f && dv >= 2.0f && dt >= 3000UL && dt <= 20000UL) {
                float ks = dv / di;
                if (ks >= K_MIN && ks <= K_MAX) {
                  k_est = 0.15f * ks + 0.85f * k_est;
                  k_est = std::max(K_MIN, std::min(K_MAX, k_est));
                  id(g_dis_k_est) = k_est;
                  ESP_LOGI("DIS", "k→%.2f (ΔI=%.1f ΔV=%.1f)", k_est, di, dv);
                }
                k_v0 = smv; k_i0 = i_act; k_t0 = now;
              } else if (std::abs(di) < 1.0f && dt > 8000UL) {
                k_v0 = smv; k_i0 = i_act; k_t0 = now;
              }
              // Log k mỗi 30s — dùng phase_enter_ms reuse (PH0 đã qua)
              if (ph >= 1 && (now - phase_enter_ms) > 30000UL) {
                ESP_LOGI("DIS", "k=%.2f V=%.0f I=%.1f ph=%d ceil=%.1f",
                         k_est, smv, i_act, ph, ceiling);
                phase_enter_ms = now;  // reset 30s timer
              }
            }

            // ══════════════════════════════════════════════
            // [PH0] SOFT_START
            // ══════════════════════════════════════════════
            if (ph == 0) {
              current_out_a = probe_start_a;
              if ((now - phase_enter_ms) >= SOFT_START_MS) {
                ph = 1;
                id(g_dis_phase) = 1;
                ramp_last_ms   = now;
                plat_b_prev    = -current_val;  // seed trước bước đầu tiên
                phase_enter_ms = now;  // reset → dùng làm k_log timer từ đây
                ESP_LOGI("DIS", "PH0→RAMP B=%.1fA", -current_val);
              }
              goto publish_dis;
            }

            // ══════════════════════════════════════════════
            // [PH1] RAMP + PLATEAU DETECT
            // [B2] Sau mỗi step: gap = C - B > 3A → tải bão hòa → lock Cx
            // ══════════════════════════════════════════════
            if (ph == 1) {
              unsigned long step_int = (smv <= taper_start) ? STEP_INT_TAPER : STEP_INT_NORM;

              if ((now - ramp_last_ms) >= step_int) {
                float i_actual = -current_val;
                float c_gap    = current_out_a - i_actual;  // C - B

                // Probe ceiling: k guard + session ceiling
                float probe_ceil = (uvp_trip_ceiling > 0.0f) ? uvp_trip_ceiling : max_i;
                if (k_est > K_MIN) {
                  float ig = (smv - uvp) / k_est * K_SAFETY_PROBE;
                  probe_ceil = std::min(probe_ceil, std::max(probe_start_a, ig));
                }
                if (ceiling >= 0.0f) probe_ceil = std::min(probe_ceil, ceiling);

                bool near_taper = (smv <= taper_start + gap * 0.5f);
                bool at_ceil    = (current_out_a >= probe_ceil - 0.5f);

                // [B2] C - B > 3A → tải bão hòa → jump Cx ngay
                bool plateau = (c_gap > 3.0f && i_actual > probe_start_a);

                if (plateau || near_taper || at_ceil) {
                  float v_head  = std::max(0.0f, smv - uvp);
                  float k_safe  = (k_est > K_MIN)
                                  ? v_head / k_est * K_SAFETY_LOCK : current_out_a;
                  k_safe = std::max(probe_start_a, std::min(max_i, k_safe));

                  // Cx = min(B_actual, k_safe) — không vượt nhu cầu thực
                  float new_ceil = plateau
                                   ? std::min(i_actual, k_safe)
                                   : std::min(current_out_a, k_safe);
                  if (ceiling >= 0.0f) new_ceil = std::min(new_ceil, ceiling);

                  ceiling = std::max(probe_start_a, new_ceil);
                  ph = 2;
                  id(g_dis_ceiling) = ceiling;
                  id(g_dis_phase)   = 2;
                  current_out_a     = ceiling;
                  if (near_taper && uvp_trip_ceiling > 0.0f) uvp_trip_ceiling = -1.0f;

                  ESP_LOGI("DIS", "%s: C=%.1fA B=%.1fA gap=%.1fA → Cx=%.1fA k=%.2f",
                           plateau ? "PLATEAU(gap>3A)" : "FORCE",
                           current_out_a, i_actual, c_gap, ceiling, k_est);
                } else {
                  // Tiếp tục ramp
                  float next_i = std::min({max_i, probe_ceil, current_out_a + step_a});
                  if (next_i > current_out_a + 0.1f) {
                    ESP_LOGI("DIS", "RAMP %.1f→%.1fA | B=%.1fA gap=%.1fA",
                             current_out_a, next_i, i_actual, c_gap);
                    current_out_a = next_i;
                  }
                  ramp_last_ms = now;
                }
              }
              goto publish_dis;
            }

            // ══════════════════════════════════════════════
            // [PH2] CEILING_LOCK — RATCHET VAN MỘT CHIỀU
            // ══════════════════════════════════════════════
            if (ph == 2) {
              float v_head  = std::max(0.0f, smv - uvp);
              float k_ceil  = (k_est > K_MIN)
                              ? v_head / k_est * K_SAFETY_RATCH : ceiling;
              k_ceil = std::max(0.0f, std::min(max_i, k_ceil));

              float new_ceil = std::min(ceiling, k_ceil);
              if (new_ceil < ceiling - 0.3f) {
                ESP_LOGI("DIS", "RATCH↓ %.1f→%.1fA head=%.0f", ceiling, new_ceil, v_head);
                ceiling = new_ceil;
                id(g_dis_ceiling) = ceiling;
              }
              current_out_a = ceiling;
              goto publish_dis;
            }

            publish_dis:
            current_out_a = std::max(0.0f, std::min(current_out_a, max_i));
            if (std::abs(current_out_a - last_published) >= 0.3f) {
              id(${name}_adaptive_discharging_current).publish_state(current_out_a);
              last_published = current_out_a;
              ESP_LOGI("DIS", "→%.1fA V=%.0f k=%.2f PH%d",
                       current_out_a, smv, k_est, ph);
            }
            id(discharging_a) = (int)current_out_a;  
  
# =================================================================
# STATUS SENSORS (unchanged structure, updated labels)
# =================================================================
text_sensor:
  - platform: template
    name: "${name} CCCV Phase"
    id: ${name}_adaptive_status
    update_interval: 2s
    lambda: |-
      if (!id(g_startup_done)) {
        unsigned long now_ms  = millis();
        unsigned long t_start = (unsigned long)id(g_startup_ms);
        long remaining = 10000L - (long)(now_ms - t_start);
        if (remaining < 0) remaining = 0;
        return {"STARTUP HOLD " + to_string((int)(remaining/1000)) + "s..."};
      }

      int   phase       = id(${name}_charge_phase);
      float current_val = id(current).state;
      float chg_i       = id(${name}_adaptive_charging_current).state;
      float dis_i       = id(${name}_adaptive_discharging_current).state;
      float max_mv      = id(max_cell_voltage).state * 1000.0f;
      float min_mv      = id(min_cell_voltage).state * 1000.0f;
      float ovp         = id(can_over_voltage_protection).state;
      float uvp         = id(can_under_voltage_protection).state;
      float gap         = id(${name}_voltage_recovery_gap).state;
      float cap_ah      = id(total_battery_capacity_setting).state;
      float c_term      = (!isnan(cap_ah) && cap_ah > 0) ? cap_ah / 20.0f : 14.0f;
      std::string status = "";

      // EOC state
      if (phase == 3) {
        return {"✅ FULL (EOC: I<C/20=" + to_string((int)c_term) + "A)"};
      }

      if (current_val > 0.5f) {
        float taper_s = ovp - gap;
        float dist    = ovp - max_mv;
        if (max_mv >= taper_s) {
          // CV zone
          status = "CV " + to_string((int)chg_i) + "A";
          status += " [dist=" + to_string((int)dist) + "mV C/20=" + to_string((int)c_term) + "A]";
        } else if (chg_i < 15.0f && chg_i >= 4.5f) {
          status = "CC " + to_string((int)chg_i) + "A [PROBE dist=" + to_string((int)dist) + "mV]";
        } else {
          status = "CC " + to_string((int)chg_i) + "A [ADAPTIVE dist=" + to_string((int)dist) + "mV]";
        }
        if (id(${name}_cc_memory_valid)) status += " 💾";

      } else if (current_val < -0.5f) {
        float taper_s = uvp + gap;
        float dist    = min_mv - uvp;
        if (min_mv <= taper_s) {
          float pos = (taper_s - min_mv) / gap;
          status = "DIS " + to_string((int)dis_i) + "A [TAPER " + to_string((int)(pos*100)) + "%]";
        } else if (dis_i < 15.0f && dis_i >= 4.5f) {
          status = "DIS " + to_string((int)dis_i) + "A [PROBE dist=" + to_string((int)dist) + "mV]";
        } else {
          status = "DIS " + to_string((int)dis_i) + "A [ADAPTIVE dist=" + to_string((int)dist) + "mV]";
        }
      } else {
        status = "IDLE";
      }

      if (max_mv > (ovp - 20)) status += " ⚠️OVP";
      if (min_mv < (uvp + 20))  status += " ⚠️UVP";
      return {status};

  - platform: template
    name: "${name} Battery Health"
    id: ${name}_battery_health
    update_interval: 30s
    lambda: |-
      float dv = (id(max_cell_voltage).state - id(min_cell_voltage).state) * 1000.0f;
      std::string h;
      if      (dv <  5.0f) h = "EXCELLENT";
      else if (dv < 15.0f) h = "GOOD";
      else if (dv < 30.0f) h = "FAIR";
      else                  h = "POOR";
      h += " (dV=" + to_string((int)dv) + "mV)";
      return {h};

  - platform: template
    name: "${name} LFP Settings Check"
    id: ${name}_chemistry_check
    update_interval: 30s
    lambda: |-
      float ovp   = id(can_over_voltage_protection).state;
      float uvp   = id(can_under_voltage_protection).state;
      float gap   = id(${name}_voltage_recovery_gap).state;
      float sag   = id(${name}_sag_compensation_mv).state;
      float range = ovp - uvp;
      std::vector<std::string> warns;

      if (ovp > 3650.0f)
        warns.push_back("🔴 OVP=" + to_string((int)ovp) + "mV > 3650mV: HỦY HOẠI CELL!");
      if (uvp < 2500.0f)
        warns.push_back("🔴 UVP=" + to_string((int)uvp) + "mV < 2500mV: HỦY HOẠI CELL!");
      if (ovp > 3550.0f && ovp <= 3650.0f)
        warns.push_back("🟠 OVP=" + to_string((int)ovp) + "mV > 3550mV: tuổi thọ giảm nhanh");
      if (uvp < 2800.0f && uvp >= 2500.0f)
        warns.push_back("🟡 UVP=" + to_string((int)uvp) + "mV < 2800mV: xả sâu");
      if (uvp >= 3150.0f && sag < 30.0f)
        warns.push_back("🟠 UVP plateau LFP, sag_comp<30mV: hunting risk");
      if (uvp >= 3200.0f && sag < 10.0f)
        warns.push_back("🟡 UVP=3.20V, sag_comp≥10mV recommended");

      float taper_chg = ovp - gap - sag;
      float taper_dis = uvp + gap + sag;
      if (taper_dis >= ovp)
        warns.push_back("🔴 UVP+gap+sag=" + to_string((int)taper_dis) + "mV ≥ OVP!");
      if (taper_chg <= uvp)
        warns.push_back("🔴 OVP-gap-sag=" + to_string((int)taper_chg) + "mV ≤ UVP!");
      if ((gap + sag) > range * 0.5f)
        warns.push_back("🟠 gap+sag=" + to_string((int)(gap+sag)) + "mV > 50% range");

      float mid_range = taper_chg - taper_dis;
      if (mid_range < 20.0f)
        warns.push_back("🟠 Normal zone " + to_string((int)mid_range) + "mV: too narrow");

      std::string status;
      if (warns.empty()) {
        status  = "✅ LFP OK | range=" + to_string((int)range) + "mV";
        status += " | taper_dis=" + to_string((int)taper_dis) + "mV";
        status += " | taper_chg=" + to_string((int)taper_chg) + "mV";
        status += " | mid=" + to_string((int)mid_range) + "mV";
      } else {
        status = "";
        for (auto& w : warns) status += w + " | ";
      }
      return {status};